name: Rebuild survey for Virtual Mirrors higher-order NLOS

on:
  push:
    paths:
      - .github/workflows/nlos-virtual-mirrors-sync.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: nlos-virtual-mirrors-sync
  cancel-in-progress: true

jobs:
  rebuild:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify synchronized sources
        run: |
          set -euo pipefail
          grep -Fq "Virtual Mirrors: Non-Line-of-Sight Imaging Beyond the Third Bounce" README.md
          grep -Fq "Virtual Mirrors: Non-Line-of-Sight Imaging Beyond the Third Bounce" index.html
          grep -Fq '<b>88</b><span>tracked latest entries</span>' index.html
          grep -Fq 'Virtual Mirrors turned higher-order phasor transport' index.html
          grep -Fq 'This result shifts higher-order light transport' article/2active.tex
          grep -Fq '\cite{royoVirtualMirrors2023}' article/2active.tex
          test "$(grep -ic '^@.*{royoVirtualMirrors2023,' egbib_merged_20260711.bib)" -eq 1
          grep -Fq '10.1145/3592429' egbib_merged_20260711.bib
          grep -Fq 'Truly missing citation keys: 0' updates/2026-07-11-bibliography-deduplication.md

      - name: Install LaTeX toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y latexmk texlive-latex-extra texlive-fonts-recommended texlive-science texlive-pictures texlive-publishers texlive-bibtex-extra poppler-utils

      - name: Clean-build survey PDF
        id: build
        shell: bash
        run: |
          set +e
          rm -f bare_jrnl.pdf bare_jrnl.aux bare_jrnl.bbl bare_jrnl.blg bare_jrnl.log bare_jrnl.out bare_jrnl.toc bare_jrnl.fdb_latexmk bare_jrnl.fls
          latexmk -pdf -interaction=nonstopmode -halt-on-error bare_jrnl.tex > /tmp/latexmk.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          if [ "$status" -ne 0 ]; then
            tail -n 180 /tmp/latexmk.log > /tmp/latex-tail.txt
          fi
          exit 0

      - name: Record build failure diagnostics
        if: steps.build.outputs.status != '0'
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          p = Path('updates/2026-07-12-virtual-mirrors-citation-tracing-update.md')
          text = p.read_text(encoding='utf-8')
          text = re.sub(r'\n\*\*Build result:\*\*.*?(?=\n\n|\Z)', '', text, flags=re.S)
          log = Path('/tmp/latex-tail.txt').read_text(encoding='utf-8', errors='replace')
          status = "\n\n**Build result:** LaTeX rebuild failed. The final log excerpt is recorded below for diagnosis; source integrations remain committed, but `bare_jrnl.pdf` has not been claimed as updated.\n\n```text\n" + log[-14000:] + "\n```\n"
          p.write_text(text.rstrip() + status, encoding='utf-8')
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add updates/2026-07-12-virtual-mirrors-citation-tracing-update.md
          git commit -m "Record Virtual Mirrors survey build diagnostics" || true
          git pull --rebase origin master
          git push origin HEAD:master
          exit 1

      - name: Validate rebuilt PDF
        if: steps.build.outputs.status == '0'
        run: |
          set -euo pipefail
          test -s bare_jrnl.pdf
          test -s bare_jrnl.bbl
          pdfinfo bare_jrnl.pdf > /tmp/pdfinfo.txt
          pdftotext -layout bare_jrnl.pdf /tmp/bare_jrnl.txt
          test -s /tmp/bare_jrnl.txt
          ! grep -Eiq "Citation .* undefined|There were undefined references|undefined citations" bare_jrnl.log
          ! grep -Eiq "Warning--I didn't find a database entry|Repeated entry" bare_jrnl.blg
          grep -Fq 'royoVirtualMirrors2023' bare_jrnl.aux
          grep -Fq 'royoVirtualMirrors2023' bare_jrnl.bbl
          grep -Eiq 'virtual mirrors.*non-line-of-sight imaging beyond the third bounce' bare_jrnl.bbl
          python - <<'PY'
          from pathlib import Path
          import re
          raw = Path('/tmp/bare_jrnl.txt').read_text(encoding='utf-8', errors='ignore').casefold()
          compact = re.sub(r'[^a-z0-9]+', '', raw)
          required = ('virtualmirrors', 'secondcorner', 'royo')
          missing = [token for token in required if token not in compact]
          if missing:
              raise SystemExit(f'Missing normalized PDF tokens: {missing}')
          PY

      - name: Record successful validation and commit PDF
        if: steps.build.outputs.status == '0'
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          p = Path('updates/2026-07-12-virtual-mirrors-citation-tracing-update.md')
          text = p.read_text(encoding='utf-8')
          text = re.sub(r'\n\*\*Build result:\*\*.*?(?=\n\n|\Z)', '', text, flags=re.S)
          status = (
              "\n\n**Build result:** successful clean LaTeX/BibTeX rebuild. README, homepage paper explorer, "
              "development timeline, corrected survey narrative, duplicate-free merged bibliography, and `bare_jrnl.pdf` "
              "now consistently include the final ACM TOG / SIGGRAPH 2023 Virtual Mirrors record. `pdfinfo` and "
              "`pdftotext` validation passed; no undefined citations, missing BibTeX records, or repeated entries were detected.\n"
          )
          p.write_text(text.rstrip() + status, encoding='utf-8')
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bare_jrnl.pdf updates/2026-07-12-virtual-mirrors-citation-tracing-update.md
          if ! git diff --cached --quiet; then
            git commit -m "Rebuild survey with higher-order Virtual Mirrors NLOS imaging"
            git pull --rebase origin master
            git push origin HEAD:master
          fi
