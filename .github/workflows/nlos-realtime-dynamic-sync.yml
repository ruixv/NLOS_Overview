name: Synchronize real-time dynamic NLOS milestone

# Trigger revision 4: validate normalized title text plus canonical BibTeX identity.
on:
  push:
    paths:
      - .github/workflows/nlos-realtime-dynamic-sync.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: nlos-survey-sync
  cancel-in-progress: true

jobs:
  sync-build-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python and synchronize artifacts
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Synchronize sources and canonical bibliography
        run: |
          set -euo pipefail
          python -m pip install bibtexparser==1.4.3
          python -m py_compile scripts/sync_nlos_20260712_realtime_dynamic.py scripts/fix_nlos_20260712_realtime_citation_key.py
          python scripts/sync_nlos_20260712_realtime_dynamic.py
          python scripts/fix_nlos_20260712_realtime_citation_key.py
          python scripts/merge_nlos_bibliography.py
          grep -q "Truly missing citation keys: 0" updates/2026-07-11-bibliography-deduplication.md
          test "$(grep -ic '^@.*{nam_real-time_2020,' egbib_merged_20260711.bib)" -eq 1
          test "$(grep -ic '^@.*{namRealTimeDynamicScenes2021,' egbib_merged_20260711.bib)" -eq 0
          grep -Fq "Real-time Non-line-of-Sight imaging of dynamic scenes" README.md
          grep -Fq "Real-time Non-line-of-Sight imaging of dynamic scenes" index.html
          grep -Fq '\cite{nam_real-time_2020}' article/2active.tex
          grep -Fq '<b>86</b><span>tracked latest entries</span>' index.html

      - name: Install LaTeX toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y latexmk texlive-latex-extra texlive-fonts-recommended texlive-science texlive-pictures texlive-publishers texlive-bibtex-extra poppler-utils

      - name: Clean-build and validate survey PDF
        run: |
          set -euo pipefail
          rm -f bare_jrnl.pdf bare_jrnl.aux bare_jrnl.bbl bare_jrnl.blg bare_jrnl.log bare_jrnl.out bare_jrnl.toc
          latexmk -pdf -interaction=nonstopmode bare_jrnl.tex > /tmp/latexmk.log 2>&1
          test -s bare_jrnl.pdf
          test -s bare_jrnl.bbl
          pdfinfo bare_jrnl.pdf > /tmp/pdfinfo.txt
          pdftotext -layout bare_jrnl.pdf /tmp/bare_jrnl.txt
          ! grep -Eiq "Citation .* undefined|There were undefined references|undefined citations" bare_jrnl.log
          ! grep -Eiq "Warning--I didn't find a database entry|Repeated entry" bare_jrnl.blg
          grep -Fq 'nam_real-time_2020' bare_jrnl.aux
          grep -Fq 'nam_real-time_2020' bare_jrnl.bbl
          ! grep -Fq 'namRealTimeDynamicScenes2021' bare_jrnl.bbl
          python - <<'PY'
          from pathlib import Path
          import re
          raw = Path('/tmp/bare_jrnl.txt').read_text(encoding='utf-8', errors='ignore').casefold()
          compact = re.sub(r'[^a-z0-9]+', '', raw)
          token = 'realtimenonlineofsightimagingofdynamicscenes'
          if token not in compact:
              raise SystemExit(f'Missing normalized PDF title token: {token}')
          PY

      - name: Record successful validation
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          p = Path('updates/2026-07-12-realtime-dynamic-nlos-citation-tracing-update.md')
          text = p.read_text(encoding='utf-8')
          text = re.sub(r'\n\*\*Build result:\*\*.*?(?=\n\n|\Z)', '', text, flags=re.S)
          status = ("\n\n**Build result:** successful clean LaTeX/BibTeX rebuild. README, homepage, survey source, "
                    "canonical duplicate-free bibliography, and `bare_jrnl.pdf` are synchronized. The existing citation key "
                    "`nam_real-time_2020` is used exactly once for this paper; `pdfinfo`/`pdftotext` passed and no undefined "
                    "or repeated BibTeX records were detected.\n")
          p.write_text(text.rstrip() + status, encoding='utf-8')
          Path('updates/2026-07-12-realtime-dynamic-nlos-build-diagnostic.md').unlink(missing_ok=True)
          PY

      - name: Commit synchronized artifacts and regenerated PDF
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md index.html article/2active.tex bare_jrnl.tex bare_jrnl.pdf \
            egbib_20260712_realtime_updates.bib egbib_merged_20260711.bib \
            updates/2026-07-12-realtime-dynamic-nlos-citation-tracing-update.md \
            updates/2026-07-11-bibliography-deduplication.md \
            scripts/sync_nlos_20260712_realtime_dynamic.py \
            scripts/fix_nlos_20260712_realtime_citation_key.py \
            .github/workflows/nlos-realtime-dynamic-sync.yml
          git add -A updates/2026-07-12-realtime-dynamic-nlos-build-diagnostic.md 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Validate canonical real-time NLOS citation and regenerate survey PDF"
            git push origin HEAD:master
          fi
