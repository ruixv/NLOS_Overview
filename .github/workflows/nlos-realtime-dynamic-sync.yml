name: Synchronize real-time dynamic NLOS milestone

# Final clean rebuild after publisher metadata was committed.
on:
  push:
    paths:
      - .github/workflows/nlos-realtime-dynamic-sync.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: nlos-final-nam-pdf
  cancel-in-progress: true

jobs:
  build-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify synchronized source metadata
        run: |
          set -euo pipefail
          grep -Fq "Low-latency time-of-flight non-line-of-sight imaging at 5 frames per second" README.md
          grep -Fq "Low-latency time-of-flight non-line-of-sight imaging at 5 frames per second" index.html
          grep -Fq 'Renna, Marco' egbib_merged_20260711.bib
          grep -Fq 'Tosi, Alberto' egbib_merged_20260711.bib
          grep -Fq '\cite{nam_real-time_2020}' article/2active.tex
          test "$(grep -ic '^@.*{nam_real-time_2020,' egbib_merged_20260711.bib)" -eq 1
          test "$(grep -ic '^@.*{namRealTimeDynamicScenes2021,' egbib_merged_20260711.bib)" -eq 0

      - name: Install LaTeX toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y latexmk texlive-latex-extra texlive-fonts-recommended texlive-science texlive-pictures texlive-publishers texlive-bibtex-extra poppler-utils

      - name: Clean-build and validate survey PDF
        run: |
          set -euo pipefail
          rm -f bare_jrnl.pdf bare_jrnl.aux bare_jrnl.bbl bare_jrnl.blg bare_jrnl.log bare_jrnl.out bare_jrnl.toc
          latexmk -pdf -interaction=nonstopmode bare_jrnl.tex > /tmp/latexmk.log 2>&1
          test -s bare_jrnl.pdf
          test -s bare_jrnl.bbl
          pdfinfo bare_jrnl.pdf > /tmp/pdfinfo.txt
          pdftotext -layout bare_jrnl.pdf /tmp/bare_jrnl.txt
          test -s /tmp/bare_jrnl.txt
          ! grep -Eiq "Citation .* undefined|There were undefined references|undefined citations" bare_jrnl.log
          ! grep -Eiq "Warning--I didn't find a database entry|Repeated entry" bare_jrnl.blg
          grep -Fq 'nam_real-time_2020' bare_jrnl.aux
          grep -Fq 'nam_real-time_2020' bare_jrnl.bbl
          ! grep -Fq 'namRealTimeDynamicScenes2021' bare_jrnl.bbl
          grep -Fq 'Low-latency time-of-flight non-line-of-sight imaging at 5 frames per second' bare_jrnl.bbl

      - name: Record successful validation
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          p = Path('updates/2026-07-12-realtime-dynamic-nlos-citation-tracing-update.md')
          text = p.read_text(encoding='utf-8')
          text = re.sub(r'\n\*\*Build result:\*\*.*?(?=\n\n|\Z)', '', text, flags=re.S)
          status = (
              "\n\n**Build result:** successful clean LaTeX/BibTeX rebuild using the final Nature Communications "
              "title and complete eight-author metadata. README, homepage, survey source, canonical duplicate-free "
              "bibliography, and `bare_jrnl.pdf` are synchronized. `pdfinfo`/`pdftotext` passed and no undefined, "
              "repeated, or duplicate-paper BibTeX records were detected.\n"
          )
          p.write_text(text.rstrip() + status, encoding='utf-8')
          PY

      - name: Commit regenerated PDF
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bare_jrnl.pdf updates/2026-07-12-realtime-dynamic-nlos-citation-tracing-update.md \
            .github/workflows/nlos-realtime-dynamic-sync.yml
          if ! git diff --cached --quiet; then
            git commit -m "Rebuild NLOS survey with final Nam et al. metadata"
            git pull --rebase origin master
            git push origin HEAD:master
          fi
