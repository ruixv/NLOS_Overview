name: Validate and publish WACV transient-rendering update

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: nlos-plack-sync
  cancel-in-progress: false

jobs:
  sync-build-publish:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Synchronize public artifacts and bibliography
        run: |
          set -euo pipefail
          python -m pip install bibtexparser==1.4.3
          python -m py_compile scripts/sync_nlos_20260713_plack.py scripts/merge_nlos_bibliography.py
          python scripts/sync_nlos_20260713_plack.py
          python scripts/sync_nlos_20260713_plack.py
          python scripts/merge_nlos_bibliography.py

          grep -Fq "Fast Differentiable Transient Rendering for Non-Line-of-Sight Reconstruction" README.md
          grep -Fq "Plack et al.: fast differentiable transient rendering" README.md
          grep -Fq "Fast Differentiable Transient Rendering for Non-Line-of-Sight Reconstruction" index.html
          grep -Fq '<b>94</b><span>tracked latest entries</span>' index.html
          grep -Fq 'Fast differentiable transient rendering, transformers' index.html
          grep -Fq 'plackFastDifferentiableTransient2023' article/2active.tex
          grep -Fq 'reduces inverse-rendering runtimes from hours to minutes' article/2active.tex
          grep -Fq 'plackFastDifferentiTransient2023' egbib_merged_20260711.bib && exit 1 || true
          grep -Fq 'plackFastDifferentiableTransient2023' egbib_merged_20260711.bib
          grep -Fq 'Proceedings of the IEEE/CVF Winter Conference on Applications of Computer Vision (WACV)' egbib_merged_20260711.bib
          grep -Fq 'Truly missing citation keys: 0' updates/2026-07-11-bibliography-deduplication.md

      - name: Install LaTeX and PDF tools
        run: |
          sudo apt-get update
          sudo apt-get install -y latexmk texlive-latex-extra texlive-fonts-recommended texlive-science texlive-pictures texlive-publishers texlive-bibtex-extra poppler-utils

      - name: Render previous PDF
        run: |
          set -euo pipefail
          test -s bare_jrnl.pdf
          cp bare_jrnl.pdf /tmp/bare_jrnl-before.pdf
          mkdir -p /tmp/render-before
          pdftoppm -png -r 100 /tmp/bare_jrnl-before.pdf /tmp/render-before/page >/dev/null 2>&1
          test "$(find /tmp/render-before -name 'page-*.png' -type f | wc -l)" -gt 0

      - name: Clean-build survey PDF
        id: build
        shell: bash
        run: |
          set +e
          rm -f bare_jrnl.pdf bare_jrnl.aux bare_jrnl.bbl bare_jrnl.blg bare_jrnl.log bare_jrnl.out bare_jrnl.toc bare_jrnl.fdb_latexmk bare_jrnl.fls
          latexmk -pdf -interaction=nonstopmode -halt-on-error bare_jrnl.tex > /tmp/latexmk.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          if [ -f bare_jrnl.log ]; then cp bare_jrnl.log /tmp/bare_jrnl-build.log; fi
          if [ -f bare_jrnl.blg ]; then cp bare_jrnl.blg /tmp/bare_jrnl-build.blg; fi
          exit 0

      - name: Upload build diagnostics
        if: steps.build.outputs.status != '0'
        uses: actions/upload-artifact@v4
        with:
          name: nlos-plack-latex-diagnostics
          path: |
            /tmp/latexmk.log
            /tmp/bare_jrnl-build.log
            /tmp/bare_jrnl-build.blg
            bare_jrnl.tex
            article/2active.tex
            egbib_merged_20260711.bib
          if-no-files-found: warn
          retention-days: 3

      - name: Fail when clean build fails
        if: steps.build.outputs.status != '0'
        run: |
          tail -n 240 /tmp/latexmk.log
          exit 1

      - name: Validate rebuilt PDF and citations
        if: steps.build.outputs.status == '0'
        run: |
          set -euo pipefail
          test -s bare_jrnl.pdf
          test -s bare_jrnl.bbl
          pdfinfo bare_jrnl.pdf > /tmp/pdfinfo-after.txt
          pdftotext -layout bare_jrnl.pdf /tmp/bare_jrnl.txt
          test -s /tmp/bare_jrnl.txt
          mkdir -p /tmp/render-after
          pdftoppm -png -r 100 bare_jrnl.pdf /tmp/render-after/page >/dev/null 2>&1
          before_pages=$(find /tmp/render-before -name 'page-*.png' -type f | wc -l)
          after_pages=$(find /tmp/render-after -name 'page-*.png' -type f | wc -l)
          test "$before_pages" -gt 0
          test "$after_pages" -gt 0
          test "$after_pages" -ge "$before_pages"

          ! grep -Eiq "Citation .* undefined|There were undefined references|undefined citations" bare_jrnl.log
          ! grep -Eiq "Warning--I didn't find a database entry|Repeated entry" bare_jrnl.blg
          grep -Fq 'plackFastDifferentiableTransient2023' bare_jrnl.aux
          grep -Fq 'plackFastDifferentiableTransient2023' bare_jrnl.bbl
          grep -Eiq 'Plack|Fast Differentiable Transient Rendering|inverse-rendering runtimes' /tmp/bare_jrnl.txt

      - name: Record success and publish artifacts
        if: steps.build.outputs.status == '0'
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          p = Path('updates/2026-07-13-fast-differentiable-transient-rendering-update.md')
          text = p.read_text(encoding='utf-8')
          text = text.replace(
              '**Build result:** pending CI execution.',
              '**Build result:** successful marker-based synchronization and clean LaTeX/BibTeX rebuild. README, homepage paper explorer, 2023 timeline, inverse-rendering survey narrative, canonical BibTeX metadata, duplicate-free merged bibliography, and `bare_jrnl.pdf` consistently include the WACV 2023 paper. PDF metadata, text extraction, before/after page rendering, citation, missing-key, and duplicate-entry checks passed.'
          )
          p.write_text(text, encoding='utf-8')
          PY

          rm -f .github/workflows/nlos-plack-sync.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Integrate fast differentiable transient rendering milestone"
          git fetch origin master
          git rebase origin/master
          git push origin HEAD:master
