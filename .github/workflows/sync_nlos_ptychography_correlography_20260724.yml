name: Integrate ptychography-enhanced NLOS correlography

on:
  push:
    branches: [master]
    paths:
      - '.github/nlos-ptychography-correlography-20260724-trigger'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  synchronize-build-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out current master
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: master
          show-progress: false

      - name: Run fail-closed source synchronization
        run: python3 scripts/sync_nlos_20260724_ptychography_correlography.py

      - name: Validate source integration
        run: |
          set -euo pipefail
          doi='10.1117/1.APN.5.2.026001'
          test "$(grep -Fio "$doi" README.md | wc -l)" -eq 1
          test "$(grep -Fio "$doi" index.html | wc -l)" -eq 1
          test "$(grep -Fio "$doi" egbib_merged_20260711.bib | wc -l)" -eq 2
          test "$(grep -Fo 'liuPtychographyCorrelography2026' article/2active.tex | wc -l)" -ge 2
          grep -Fq 'Ptychography-enhanced correlography' README.md
          grep -Fq 'Ptychography-enhanced correlography' index.html
          grep -Fq 'Ptychography-enhanced correlography' article/2active.tex
          grep -Fq 'ptychography-enhanced steady-state correlography integrated' bare_jrnl.tex
          grep -Fq '<b>193</b><span>tracked latest entries</span>' index.html

      - name: Install LaTeX and PDF validation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-latex-base texlive-latex-extra texlive-fonts-recommended texlive-science texlive-publishers texlive-bibtex-extra poppler-utils

      - name: Clean LaTeX build
        run: |
          set -euo pipefail
          rm -f bare_jrnl.aux bare_jrnl.bbl bare_jrnl.blg bare_jrnl.log bare_jrnl.out bare_jrnl.toc bare_jrnl.pdf
          pdflatex -interaction=nonstopmode -halt-on-error bare_jrnl.tex
          bibtex bare_jrnl
          pdflatex -interaction=nonstopmode -halt-on-error bare_jrnl.tex
          pdflatex -interaction=nonstopmode -halt-on-error bare_jrnl.tex

      - name: Validate rebuilt survey PDF
        run: |
          set -euo pipefail
          test -s bare_jrnl.pdf
          pdfinfo bare_jrnl.pdf | tee /tmp/pdfinfo.txt
          pages=$(awk '/^Pages:/ {print $2}' /tmp/pdfinfo.txt)
          test -n "$pages"
          test "$pages" -gt 0
          pdftotext bare_jrnl.pdf /tmp/bare_jrnl.txt
          grep -Fqi 'Ptychography-enhanced' /tmp/bare_jrnl.txt
          grep -Fqi 'Advanced Photonics Nexus' /tmp/bare_jrnl.txt
          if grep -Eqi 'undefined citations|citation .* undefined' bare_jrnl.log; then
            echo 'Undefined citation detected' >&2
            exit 1
          fi
          if grep -Eqi 'Repeated entry' bare_jrnl.blg; then
            echo 'Repeated bibliography entry detected' >&2
            exit 1
          fi

      - name: Mark integration complete
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('updates/2026-07-24-ptychography-correlography-citation-trace.md')
          text = path.read_text(encoding='utf-8')
          old = '**Status before automation:** verified metadata and fail-closed synchronization/build workflow committed; public-source integration and PDF rebuild pending validation.'
          new = '**Status after automation:** README, website, active-survey prose and table, consolidated bibliography, and rebuilt PDF are mutually synchronized and validated.'
          if old in text:
              text = text.replace(old, new, 1)
          elif new not in text:
              raise SystemExit('Expected pending or completed integration status marker')
          path.write_text(text, encoding='utf-8')
          PY

      - name: Commit synchronized artifacts
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add README.md index.html article/2active.tex bare_jrnl.tex egbib_merged_20260711.bib bare_jrnl.pdf updates/2026-07-24-ptychography-correlography-citation-trace.md
          if git diff --cached --quiet; then
            echo 'No synchronized artifact changes remain to commit.'
          else
            git commit -m 'Integrate ptychography-enhanced NLOS correlography'
            git push origin HEAD:master
          fi
