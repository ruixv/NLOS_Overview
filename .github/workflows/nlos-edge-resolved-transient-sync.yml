name: Synchronize edge-resolved transient NLOS milestone

on:
  push:
    paths:
      - .github/workflows/nlos-edge-resolved-transient-sync.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: nlos-edge-resolved-transient-sync
  cancel-in-progress: true

jobs:
  sync-build-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Synchronize text artifacts and bibliography
        run: |
          set -euo pipefail
          python -m pip install bibtexparser==1.4.3
          python -m py_compile scripts/sync_nlos_20260712_erti.py scripts/merge_nlos_bibliography.py
          python scripts/sync_nlos_20260712_erti.py
          python scripts/merge_nlos_bibliography.py
          grep -Fq "Seeing Around Corners with Edge-Resolved Transient Imaging" README.md
          grep -Fq "Seeing Around Corners with Edge-Resolved Transient Imaging" index.html
          grep -Fq '<b>87</b><span>tracked latest entries</span>' index.html
          grep -Fq '\cite{rappEdgeResolvedTransient2020}' article/2active.tex
          test "$(grep -ic '^@.*{rappEdgeResolvedTransient2020,' egbib_merged_20260711.bib)" -eq 1
          grep -Fq '10.1038/s41467-020-19727-4' egbib_merged_20260711.bib
          grep -Fq 'Truly missing citation keys: 0' updates/2026-07-11-bibliography-deduplication.md

      - name: Commit synchronized source artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md index.html article/2active.tex bare_jrnl.tex \
            egbib_20260712_erti_updates.bib egbib_merged_20260711.bib \
            updates/2026-07-11-bibliography-deduplication.md \
            updates/2026-07-12-edge-resolved-transient-citation-tracing-update.md \
            scripts/sync_nlos_20260712_erti.py \
            .github/workflows/nlos-edge-resolved-transient-sync.yml
          if ! git diff --cached --quiet; then
            git commit -m "Integrate edge-resolved transient NLOS milestone"
            git pull --rebase origin master
            git push origin HEAD:master
          fi

      - name: Install LaTeX toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y latexmk texlive-latex-extra texlive-fonts-recommended texlive-science texlive-pictures texlive-publishers texlive-bibtex-extra poppler-utils

      - name: Clean-build and validate survey PDF
        run: |
          set -euo pipefail
          rm -f bare_jrnl.pdf bare_jrnl.aux bare_jrnl.bbl bare_jrnl.blg bare_jrnl.log bare_jrnl.out bare_jrnl.toc bare_jrnl.fdb_latexmk bare_jrnl.fls
          latexmk -pdf -interaction=nonstopmode -halt-on-error bare_jrnl.tex > /tmp/latexmk.log 2>&1
          test -s bare_jrnl.pdf
          test -s bare_jrnl.bbl
          pdfinfo bare_jrnl.pdf > /tmp/pdfinfo.txt
          pdftotext -layout bare_jrnl.pdf /tmp/bare_jrnl.txt
          test -s /tmp/bare_jrnl.txt
          ! grep -Eiq "Citation .* undefined|There were undefined references|undefined citations" bare_jrnl.log
          ! grep -Eiq "Warning--I didn't find a database entry|Repeated entry" bare_jrnl.blg
          grep -Fq 'rappEdgeResolvedTransient2020' bare_jrnl.aux
          grep -Fq 'rappEdgeResolvedTransient2020' bare_jrnl.bbl
          grep -Fq 'Seeing Around Corners with Edge-Resolved Transient Imaging' bare_jrnl.bbl
          python - <<'PY'
          from pathlib import Path
          import re
          raw = Path('/tmp/bare_jrnl.txt').read_text(encoding='utf-8', errors='ignore').casefold()
          compact = re.sub(r'[^a-z0-9]+', '', raw)
          required = (
              'seeingaroundcornerswithedgeresolvedtransientimaging',
              'edgeresolvedtransientimaging',
              'rapp',
          )
          missing = [token for token in required if token not in compact]
          if missing:
              raise SystemExit(f'Missing normalized PDF tokens: {missing}')
          PY

      - name: Record successful validation
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          p = Path('updates/2026-07-12-edge-resolved-transient-citation-tracing-update.md')
          text = p.read_text(encoding='utf-8')
          text = re.sub(r'\n\*\*Build result:\*\*.*?(?=\n\n|\Z)', '', text, flags=re.S)
          status = (
              "\n\n**Build result:** successful clean LaTeX/BibTeX rebuild. README, homepage paper explorer, "
              "development timeline, survey narrative, duplicate-free merged bibliography, and `bare_jrnl.pdf` "
              "now consistently include the final Nature Communications record for edge-resolved transient imaging. "
              "`pdfinfo` and `pdftotext` validation passed; no undefined citations, missing BibTeX records, or repeated "
              "entries were detected.\n"
          )
          p.write_text(text.rstrip() + status, encoding='utf-8')
          PY

      - name: Commit regenerated PDF and validation note
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bare_jrnl.pdf updates/2026-07-12-edge-resolved-transient-citation-tracing-update.md
          if ! git diff --cached --quiet; then
            git commit -m "Rebuild survey with edge-resolved transient imaging"
            git pull --rebase origin master
            git push origin HEAD:master
          fi
