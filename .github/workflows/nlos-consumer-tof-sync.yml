name: Synchronize commodity iToF and compact TCSPC NLOS update

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: nlos-consumer-tof-sync
  cancel-in-progress: false

jobs:
  sync-build-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Synchronize text artifacts and bibliography
        run: |
          set -euo pipefail
          python -m pip install bibtexparser==1.4.3
          python -m py_compile \
            scripts/sync_nlos_20260712_initial_access.py \
            scripts/sync_nlos_20260713_consumer_tof.py \
            scripts/merge_nlos_bibliography.py
          python scripts/sync_nlos_20260712_initial_access.py
          python scripts/sync_nlos_20260713_consumer_tof.py
          python scripts/merge_nlos_bibliography.py

      - name: Verify synchronized sources
        run: |
          set -euo pipefail
          grep -Fq "Enabling NLOS Imaging Capabilities at the Initial Access of 6G Base Stations" README.md
          grep -Fq "NIGHT -- Non-Line-of-Sight Imaging from Indirect Time of Flight Data" README.md
          grep -Fq "Miniaturized time-correlated single-photon counting module" README.md
          grep -Fq "**Update run: 13 July 2026.**" README.md
          grep -Fq "NIGHT -- Non-Line-of-Sight Imaging from Indirect Time of Flight Data" index.html
          grep -Fq "Miniaturized time-correlated single-photon counting module" index.html
          grep -Fq '<b>91</b><span>tracked latest entries</span>' index.html
          grep -Fq 'commodity iToF, compact TCSPC' index.html
          grep -Fq 'Updated 13 July 2026' index.html
          grep -Fq '\cite{tornielliInitialAccessNLOS2025}' article/5newscenes.tex
          grep -Fq '\cite{caligiuriNIGHT2024}' article/2active.tex
          grep -Fq '\cite{wuMiniaturizedTCSPC2024}' article/2active.tex
          grep -Fq 'commodity indirect-ToF hardware' article/2active.tex
          grep -Fq 'Miniaturized TCSPC electronics' article/2active.tex
          test "$(grep -ic '^@.*{tornielliInitialAccessNLOS2025,' egbib_merged_20260711.bib)" -eq 1
          test "$(grep -ic '^@.*{caligiuriNIGHT2024,' egbib_merged_20260711.bib)" -eq 1
          test "$(grep -ic '^@.*{wuMiniaturizedTCSPC2024,' egbib_merged_20260711.bib)" -eq 1
          grep -Fq '10.1063/5.0193824' egbib_merged_20260711.bib
          grep -Fq '2403.19376' egbib_merged_20260711.bib
          grep -Fq 'Truly missing citation keys: 0' updates/2026-07-11-bibliography-deduplication.md

      - name: Install LaTeX and rendering toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y latexmk texlive-latex-extra texlive-fonts-recommended texlive-science texlive-pictures texlive-publishers texlive-bibtex-extra poppler-utils

      - name: Preserve and render previous PDF
        run: |
          set -euo pipefail
          test -s bare_jrnl.pdf
          cp bare_jrnl.pdf /tmp/bare_jrnl-before.pdf
          mkdir -p /tmp/render-before
          pdftoppm -png -r 100 /tmp/bare_jrnl-before.pdf /tmp/render-before/page >/dev/null 2>&1
          test "$(find /tmp/render-before -name 'page-*.png' -type f | wc -l)" -gt 0
          pdfinfo /tmp/bare_jrnl-before.pdf > /tmp/pdfinfo-before.txt

      - name: Clean-build survey PDF
        id: build
        shell: bash
        run: |
          set +e
          rm -f bare_jrnl.pdf bare_jrnl.aux bare_jrnl.bbl bare_jrnl.blg bare_jrnl.log bare_jrnl.out bare_jrnl.toc bare_jrnl.fdb_latexmk bare_jrnl.fls
          latexmk -pdf -interaction=nonstopmode -halt-on-error bare_jrnl.tex > /tmp/latexmk.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          if [ "$status" -ne 0 ]; then
            tail -n 220 /tmp/latexmk.log > /tmp/latex-tail.txt
          fi
          exit 0

      - name: Record build failure and preserve source update
        if: steps.build.outputs.status != '0'
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          p = Path('updates/2026-07-13-consumer-tof-and-tcspc-update.md')
          text = p.read_text(encoding='utf-8')
          text = re.sub(r'\n\*\*Build result:\*\*.*?(?=\n\n|\Z)', '', text, flags=re.S)
          log = Path('/tmp/latex-tail.txt').read_text(encoding='utf-8', errors='replace')
          status = "\n\n**Build result:** LaTeX rebuild failed. The synchronized README, homepage, survey, and bibliography sources are retained, but `bare_jrnl.pdf` has not been claimed as updated. Final log excerpt:\n\n```text\n" + log[-16000:] + "\n```\n"
          p.write_text(text.rstrip() + status, encoding='utf-8')
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md index.html article/2active.tex article/5newscenes.tex bare_jrnl.tex \
            egbib_20260712_initial_access_updates.bib egbib_20260713_consumer_tof_updates.bib \
            egbib_merged_20260711.bib updates/2026-07-11-bibliography-deduplication.md \
            updates/2026-07-12-6g-initial-access-nlos-imaging-update.md \
            updates/2026-07-13-consumer-tof-and-tcspc-update.md \
            scripts/sync_nlos_20260712_initial_access.py scripts/sync_nlos_20260713_consumer_tof.py
          git commit -m "Integrate commodity ToF and compact TCSPC NLOS sources" || true
          git pull --rebase origin master
          git push origin HEAD:master
          exit 1

      - name: Validate rebuilt PDF and rendered pages
        if: steps.build.outputs.status == '0'
        run: |
          set -euo pipefail
          test -s bare_jrnl.pdf
          test -s bare_jrnl.bbl
          pdfinfo bare_jrnl.pdf > /tmp/pdfinfo-after.txt
          pdftotext -layout bare_jrnl.pdf /tmp/bare_jrnl.txt
          test -s /tmp/bare_jrnl.txt
          mkdir -p /tmp/render-after
          pdftoppm -png -r 100 bare_jrnl.pdf /tmp/render-after/page >/dev/null 2>&1
          before_pages=$(find /tmp/render-before -name 'page-*.png' -type f | wc -l)
          after_pages=$(find /tmp/render-after -name 'page-*.png' -type f | wc -l)
          test "$after_pages" -gt 0
          test "$after_pages" -ge "$before_pages"
          ! grep -Eiq "Citation .* undefined|There were undefined references|undefined citations" bare_jrnl.log
          ! grep -Eiq "Warning--I didn't find a database entry|Repeated entry" bare_jrnl.blg
          for key in tornielliInitialAccessNLOS2025 caligiuriNIGHT2024 wuMiniaturizedTCSPC2024; do
            grep -Fq "$key" bare_jrnl.aux
            grep -Fq "$key" bare_jrnl.bbl
          done
          python - <<'PY'
          from pathlib import Path
          import re
          raw = Path('/tmp/bare_jrnl.txt').read_text(encoding='utf-8', errors='ignore').casefold()
          compact = re.sub(r'[^a-z0-9]+', '', raw)
          required = (
              'initialaccess', 'modularreflector', 'torniellibellini',
              'indirecttof', 'virtualmirror', 'caligiuri',
              'miniaturizedtcspc', '27.4ps', 'reviewofscientificinstruments',
          )
          missing = [token for token in required if token not in compact]
          if missing:
              raise SystemExit(f'Missing normalized PDF tokens: {missing}')
          PY

      - name: Record success, remove one-shot workflow, and commit artifacts
        if: steps.build.outputs.status == '0'
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          p = Path('updates/2026-07-13-consumer-tof-and-tcspc-update.md')
          text = p.read_text(encoding='utf-8')
          text = re.sub(r'\n\*\*Build result:\*\*.*?(?=\n\n|\Z)', '', text, flags=re.S)
          status = (
              "\n\n**Build result:** successful clean LaTeX/BibTeX rebuild. README, homepage paper explorer, "
              "2024/2025 timelines, active-hardware and radar/RF survey narratives, canonical BibTeX records, "
              "duplicate-free merged bibliography, and `bare_jrnl.pdf` consistently include NIGHT, the compact "
              "TCSPC module, and the pending 6G initial-access NLOS work. Previous and regenerated PDFs were rendered "
              "to PNG pages; `pdfinfo` and `pdftotext` checks passed, and no undefined citations, missing BibTeX "
              "records, or repeated entries were detected.\n"
          )
          p.write_text(text.rstrip() + status, encoding='utf-8')
          q = Path('updates/2026-07-12-6g-initial-access-nlos-imaging-update.md')
          qtext = q.read_text(encoding='utf-8')
          qtext = re.sub(r'\n\*\*Build result:\*\*.*?(?=\n\n|\Z)', '', qtext, flags=re.S)
          qstatus = (
              "\n\n**Build result:** successful source synchronization and clean survey rebuild in the 13 July "
              "commodity-ToF integration run. README, homepage, timeline, radar/RF survey narrative, canonical "
              "BibTeX record, merged bibliography, and `bare_jrnl.pdf` now consistently include the 6G "
              "initial-access NLOS imaging work.\n"
          )
          q.write_text(qtext.rstrip() + qstatus, encoding='utf-8')
          PY
          rm .github/workflows/nlos-consumer-tof-sync.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Integrate commodity ToF and compact TCSPC NLOS papers"
          git pull --rebase origin master
          git push origin HEAD:master
