name: Synchronize NLOS Occlusion Fields

on:
  push:
    branches: [master]
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: nlos-occlusion-fields-sync
  cancel-in-progress: false

jobs:
  sync-build-publish:
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Synchronize artifacts and bibliography
        run: |
          set -euo pipefail
          python -m pip install bibtexparser==1.4.3
          python -m py_compile scripts/sync_nlos_20260714_occlusion_fields.py scripts/merge_nlos_bibliography.py
          python scripts/sync_nlos_20260714_occlusion_fields.py
          sha256sum README.md index.html article/2active.tex > /tmp/occlusion-fields-before-second.sha
          python scripts/sync_nlos_20260714_occlusion_fields.py
          sha256sum README.md index.html article/2active.tex > /tmp/occlusion-fields-after-second.sha
          diff -u /tmp/occlusion-fields-before-second.sha /tmp/occlusion-fields-after-second.sha
          python scripts/merge_nlos_bibliography.py

          grep -Fq 'Occlusion Fields: An Implicit Representation for Non-Line-of-Sight Surface Reconstruction' README.md
          grep -Fq '| arXiv 2022 | Represents a hidden surface as the decision boundary' README.md
          grep -Fq 'Occlusion Fields — implicit recoverability and self-occlusion-aware hidden meshes' README.md
          grep -Fq 'Occlusion Fields: An Implicit Representation for Non-Line-of-Sight Surface Reconstruction' index.html
          grep -Fq '<b>96</b><span>tracked latest entries</span>' index.html
          grep -Fq 'recover beyond conservative Fermat-path visibility' index.html
          grep -Fq 'Implicit occlusion fields beyond Fermat-visible surfaces' article/2active.tex
          test "$(grep -Fo 'grauOcclusionFields2022' article/2active.tex | wc -l)" -eq 2
          grep -Fq 'grauOcclusionFields2022' egbib_merged_20260711.bib
          grep -Fq 'Truly missing citation keys: 0' updates/2026-07-11-bibliography-deduplication.md

      - name: Install LaTeX and PDF tools
        run: |
          sudo apt-get update
          sudo apt-get install -y latexmk texlive-latex-extra texlive-fonts-recommended texlive-science texlive-pictures texlive-publishers texlive-bibtex-extra poppler-utils

      - name: Render previous PDF
        run: |
          set -euo pipefail
          test -s bare_jrnl.pdf
          cp bare_jrnl.pdf /tmp/bare_jrnl-before.pdf
          mkdir -p /tmp/render-before
          pdftoppm -png -r 100 /tmp/bare_jrnl-before.pdf /tmp/render-before/page >/dev/null 2>&1
          test "$(find /tmp/render-before -name 'page-*.png' -type f | wc -l)" -gt 0

      - name: Clean-build survey PDF
        run: |
          set -euo pipefail
          rm -f bare_jrnl.pdf bare_jrnl.aux bare_jrnl.bbl bare_jrnl.blg bare_jrnl.log bare_jrnl.out bare_jrnl.toc bare_jrnl.fdb_latexmk bare_jrnl.fls
          latexmk -pdf -interaction=nonstopmode -halt-on-error bare_jrnl.tex

      - name: Validate rebuilt PDF and citation consistency
        run: |
          set -euo pipefail
          test -s bare_jrnl.pdf
          test -s bare_jrnl.bbl
          pdfinfo bare_jrnl.pdf > /tmp/pdfinfo-after.txt
          pdftotext -layout bare_jrnl.pdf /tmp/bare_jrnl.txt
          test -s /tmp/bare_jrnl.txt
          mkdir -p /tmp/render-after
          pdftoppm -png -r 100 bare_jrnl.pdf /tmp/render-after/page >/dev/null 2>&1
          before_pages=$(find /tmp/render-before -name 'page-*.png' -type f | wc -l)
          after_pages=$(find /tmp/render-after -name 'page-*.png' -type f | wc -l)
          test "$after_pages" -ge "$before_pages"
          ! grep -Eiq "Citation .* undefined|There were undefined references|undefined citations" bare_jrnl.log
          ! grep -Eiq "Warning--I didn't find a database entry|Repeated entry" bare_jrnl.blg
          grep -Fq 'grauOcclusionFields2022' bare_jrnl.aux
          grep -Fq 'grauOcclusionFields2022' bare_jrnl.bbl
          grep -Eiq 'Implicit occlusion fields beyond Fermat-visible surfaces|decision boundary between points.*visible.*occluded|adaptive.*mesh' /tmp/bare_jrnl.txt

      - name: Publish validated synchronization
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          p = Path('updates/2026-07-14-occlusion-fields-consistency.md')
          text = p.read_text(encoding='utf-8')
          staged = '**Build status:** staged for safe GitHub Actions synchronization and clean LaTeX/BibTeX/PDF validation.'
          done = '**Build status:** README, homepage/paper explorer, survey source, merged bibliography, and regenerated PDF were synchronized; clean build and citation/PDF checks passed.'
          text = text.replace(staged, done)
          if done not in text:
              text = text.rstrip() + '\n\n' + done + '\n'
          p.write_text(text, encoding='utf-8')
          PY

          rm -f .github/workflows/nlos-occlusion-fields-sync.yml
          rm -f updates/.occlusion-fields-pr-trigger
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Integrate Occlusion Fields implicit NLOS surfaces"
          branch="${GITHUB_HEAD_REF:-master}"
          git fetch origin "$branch"
          git rebase "origin/$branch"
          git push origin HEAD:"$branch"
