name: Sync optimized NLOS sampling update

on:
  push:
    branches: [master, automation/optimized-nlos-sampling-20260716]
    paths:
      - egbib_20260716_optimized_sampling_updates.bib
      - scripts/sync_nlos_20260716_optimized_sampling.py
      - updates/2026-07-16-optimized-sampling-citation-tracing.md
      - .github/workflows/sync_nlos_optimized_sampling_20260716.yml
  pull_request:
    branches: [master]
    paths:
      - egbib_20260716_optimized_sampling_updates.bib
      - scripts/sync_nlos_20260716_optimized_sampling.py
      - updates/2026-07-16-optimized-sampling-citation-tracing.md
      - .github/workflows/sync_nlos_optimized_sampling_20260716.yml

permissions:
  contents: write

jobs:
  sync-build-validate:
    runs-on: ubuntu-latest
    env:
      TARGET_BRANCH: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
    steps:
      - name: Check out writable branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.TARGET_BRANCH }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Synchronize public sources
        run: python scripts/sync_nlos_20260716_optimized_sampling.py

      - name: Merge and audit bibliography
        run: |
          python -m pip install --disable-pip-version-check bibtexparser==1.4.3
          python scripts/merge_nlos_bibliography.py

      - name: Install LaTeX and PDF validation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y latexmk texlive-latex-extra texlive-fonts-recommended texlive-science texlive-pictures texlive-publishers texlive-bibtex-extra poppler-utils

      - name: Clean-build survey PDF
        run: |
          rm -f bare_jrnl.pdf bare_jrnl.aux bare_jrnl.bbl bare_jrnl.blg bare_jrnl.log bare_jrnl.out bare_jrnl.toc bare_jrnl.fdb_latexmk bare_jrnl.fls
          latexmk -pdf -interaction=nonstopmode -halt-on-error bare_jrnl.tex

      - name: Validate sources, bibliography, and PDF
        run: |
          test -s bare_jrnl.pdf
          test -s bare_jrnl.bbl
          pdfinfo bare_jrnl.pdf | grep -E '^Pages:[[:space:]]+[1-9][0-9]*$'
          pdftotext -layout bare_jrnl.pdf bare_jrnl.txt
          grep -F "Optimized Sampling for Non-Line-of-Sight Imaging Using Modified Fast Fourier Transforms" README.md
          grep -F "Optimized Sampling for Non-Line-of-Sight Imaging Using Modified Fast Fourier Transforms" index.html
          grep -F "Nonuniform and scaled Fourier sampling" article/2active.tex
          if grep -Eiq "undefined citations|Citation .* undefined|There were undefined references" bare_jrnl.log; then
            echo "Undefined citations or references detected" >&2
            exit 1
          fi
          if grep -Eiq "Warning--I didn't find a database entry|Repeated entry" bare_jrnl.blg; then
            echo "Missing or repeated BibTeX entries detected" >&2
            exit 1
          fi
          python - <<'PY'
          from pathlib import Path
          bib = Path("egbib_merged_20260711.bib").read_text(encoding="utf-8")
          bbl = Path("bare_jrnl.bbl").read_text(encoding="utf-8", errors="replace")
          tex = Path("article/2active.tex").read_text(encoding="utf-8")
          index = Path("index.html").read_text(encoding="utf-8")
          readme = Path("README.md").read_text(encoding="utf-8")
          pdf_text = Path("bare_jrnl.txt").read_text(encoding="utf-8", errors="replace")
          normalized_bbl = " ".join(bbl.split()).casefold()
          normalized_pdf = " ".join(pdf_text.split()).casefold()
          key = "sultanOptimizedSamplingNLOS2025"
          title = "Optimized Sampling for Non-Line-of-Sight Imaging Using Modified Fast Fourier Transforms"
          if "{" + key + "," not in bib:
              raise SystemExit(f"missing bibliography key: {key}")
          if key not in tex:
              raise SystemExit(f"missing survey citation: {key}")
          if "optimized sampling for non-line-of-sight imaging" not in normalized_bbl or "modified fast fourier transforms" not in normalized_bbl:
              raise SystemExit("optimized-sampling record is missing from generated bibliography")
          if "nonuniform and scaled fourier sampling" not in normalized_pdf:
              raise SystemExit("optimized-sampling discussion is missing from rendered PDF text")
          if index.count('title:"' + title + '"') != 1:
              raise SystemExit("homepage title is missing or duplicated")
          if readme.count("[" + title + "]") != 1:
              raise SystemExit("README title is missing or duplicated")
          if '<div class="stat"><b>101</b><span>tracked latest entries</span></div>' not in index:
              raise SystemExit("homepage tracked count should remain 101")
          if "16 July 2026" not in index or "16 July 2026" not in readme:
              raise SystemExit("public update dates were not synchronized")
          print("Optimized Fourier sampling update is mutually consistent.")
          PY
          rm bare_jrnl.txt

      - name: Commit synchronized sources and generated PDF
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md index.html article/2active.tex bare_jrnl.tex bare_jrnl.pdf egbib_merged_20260711.bib updates/2026-07-11-bibliography-deduplication.md updates/2026-07-16-optimized-sampling-citation-tracing.md
          if git diff --cached --quiet; then
            echo "Repository already synchronized."
            exit 0
          fi
          git commit -m "Integrate optimized Fourier sampling milestone"
          git fetch origin "$TARGET_BRANCH"
          git rebase "origin/$TARGET_BRANCH"
          git push origin HEAD:"$TARGET_BRANCH"
