name: Validate and publish occlusion-coded NLOS update

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: nlos-occlusion-sync
  cancel-in-progress: false

jobs:
  sync-build-publish:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Synchronize public artifacts and bibliography
        run: |
          set -euo pipefail
          python -m pip install bibtexparser==1.4.3
          python -m py_compile \
            scripts/sync_nlos_20260713_occlusion.py \
            scripts/merge_nlos_bibliography.py
          python scripts/sync_nlos_20260713_occlusion.py
          python scripts/merge_nlos_bibliography.py

          grep -Fq "Exploiting Occlusion in Non-Line-of-Sight Active Imaging" README.md
          grep -Fq "Revealing hidden scenes by photon-efficient occlusion-based opportunistic active imaging" README.md
          grep -Fq "Revealing hidden scenes by photon-efficient occlusion-based opportunistic active imaging" index.html
          grep -Fq '<b>93</b><span>tracked latest entries</span>' index.html
          grep -Fq 'Natural-occluder coding and occlusion-aware active NLOS' index.html
          grep -Fq 'photon-efficient occlusion imaging' index.html
          grep -Fq 'translated this principle into a photon-efficient room-scale experiment' article/2active.tex
          grep -Fq 'thrampoulidisExploitingOcclusionNonLineofSight2018' egbib_merged_20260711.bib
          grep -Fq 'xuPhotonEfficientOcclusion2018' egbib_merged_20260711.bib
          grep -Fq '10.1364/OE.26.009945' egbib_merged_20260711.bib
          grep -Fq 'Truly missing citation keys: 0' updates/2026-07-11-bibliography-deduplication.md

      - name: Install LaTeX and PDF tools
        run: |
          sudo apt-get update
          sudo apt-get install -y latexmk texlive-latex-extra texlive-fonts-recommended texlive-science texlive-pictures texlive-publishers texlive-bibtex-extra poppler-utils

      - name: Clean-build survey PDF
        id: build
        shell: bash
        run: |
          set +e
          test -s bare_jrnl.pdf
          cp bare_jrnl.pdf /tmp/bare_jrnl-before.pdf
          rm -f bare_jrnl.pdf bare_jrnl.aux bare_jrnl.bbl bare_jrnl.blg bare_jrnl.log bare_jrnl.out bare_jrnl.toc bare_jrnl.fdb_latexmk bare_jrnl.fls
          latexmk -pdf -interaction=nonstopmode -halt-on-error bare_jrnl.tex > /tmp/latexmk.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          if [ -f bare_jrnl.log ]; then cp bare_jrnl.log /tmp/bare_jrnl-build.log; fi
          if [ -f bare_jrnl.blg ]; then cp bare_jrnl.blg /tmp/bare_jrnl-build.blg; fi
          exit 0

      - name: Upload build diagnostics
        if: steps.build.outputs.status != '0'
        uses: actions/upload-artifact@v4
        with:
          name: nlos-occlusion-latex-diagnostics
          path: |
            /tmp/latexmk.log
            /tmp/bare_jrnl-build.log
            /tmp/bare_jrnl-build.blg
            bare_jrnl.tex
            article/2active.tex
            egbib_merged_20260711.bib
          if-no-files-found: warn
          retention-days: 3

      - name: Fail when clean build fails
        if: steps.build.outputs.status != '0'
        run: |
          tail -n 240 /tmp/latexmk.log
          exit 1

      - name: Validate rebuilt PDF and citations
        if: steps.build.outputs.status == '0'
        run: |
          set -euo pipefail
          test -s bare_jrnl.pdf
          test -s bare_jrnl.bbl
          pdfinfo bare_jrnl.pdf > /tmp/pdfinfo-after.txt
          pdftotext -layout bare_jrnl.pdf /tmp/bare_jrnl.txt
          test -s /tmp/bare_jrnl.txt
          mkdir -p /tmp/render-after
          pdftoppm -png -r 100 bare_jrnl.pdf /tmp/render-after/page >/dev/null 2>&1
          test "$(find /tmp/render-after -name 'page-*.png' -type f | wc -l)" -gt 0

          ! grep -Eiq "Citation .* undefined|There were undefined references|undefined citations" bare_jrnl.log
          ! grep -Eiq "Warning--I didn't find a database entry|Repeated entry" bare_jrnl.blg
          for key in thrampoulidisExploitingOcclusionNonLineofSight2018 xuPhotonEfficientOcclusion2018; do
            grep -Fq "$key" bare_jrnl.aux
            grep -Fq "$key" bare_jrnl.bbl
          done
          grep -Eiq 'Thrampoulidis|Xu, Feihu|photon-efficient room-scale' /tmp/bare_jrnl.txt

      - name: Record success and publish artifacts
        if: steps.build.outputs.status == '0'
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import re

          p = Path('updates/2026-07-13-occlusion-coded-active-nlos-update.md')
          text = p.read_text(encoding='utf-8')
          text = re.sub(r'\n\*\*Build result:\*\*.*?(?=\n\n|\Z)', '', text, flags=re.S)
          status = (
              'successful marker-based synchronization and clean LaTeX/BibTeX rebuild. README, homepage paper '
              'explorer, 2017–2018 timeline, active-system table, occlusion-model survey narrative, canonical '
              'BibTeX metadata, duplicate-free merged bibliography, and `bare_jrnl.pdf` consistently include the '
              'occlusion-coding theory and its photon-efficient Optics Express validation. PDF metadata, text '
              'extraction, page rendering, citation, missing-key, and duplicate-entry checks passed.'
          )
          p.write_text(text.rstrip() + '\n\n**Build result:** ' + status + '\n', encoding='utf-8')
          PY

          rm -f .github/workflows/nlos-occlusion-sync.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Integrate occlusion-coded active NLOS milestones"
          git fetch origin master
          git rebase origin/master
          git push origin HEAD:master
