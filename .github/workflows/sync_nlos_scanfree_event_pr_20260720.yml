name: Validate and integrate scan-free and event-camera NLOS updates

on:
  pull_request:
    branches: [master]
    paths:
      - '.automation/nlos-scanfree-event-20260720.trigger'
      - '.github/workflows/sync_nlos_scanfree_event_pr_20260720.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-build-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out pull-request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Update README
        run: python -c "import importlib.util as u; s=u.spec_from_file_location('x','scripts/sync_nlos_20260720_scanfree_event.py'); m=u.module_from_spec(s); s.loader.exec_module(m); m.update_readme()"

      - name: Update website
        run: python -c "import importlib.util as u; s=u.spec_from_file_location('x','scripts/sync_nlos_20260720_scanfree_event.py'); m=u.module_from_spec(s); s.loader.exec_module(m); m.update_index()"

      - name: Update active survey section
        run: python -c "import importlib.util as u; s=u.spec_from_file_location('x','scripts/sync_nlos_20260720_scanfree_event.py'); m=u.module_from_spec(s); s.loader.exec_module(m); m.update_active_tex()"

      - name: Update passive survey section
        run: python -c "import importlib.util as u; s=u.spec_from_file_location('x','scripts/sync_nlos_20260720_scanfree_event.py'); m=u.module_from_spec(s); s.loader.exec_module(m); m.update_passive_tex()"

      - name: Update master survey and bibliography
        run: python -c "import importlib.util as u; s=u.spec_from_file_location('x','scripts/sync_nlos_20260720_scanfree_event.py'); m=u.module_from_spec(s); s.loader.exec_module(m); m.update_master_and_bib()"

      - name: Update integration notes
        run: python -c "import importlib.util as u; s=u.spec_from_file_location('x','scripts/sync_nlos_20260720_scanfree_event.py'); m=u.module_from_spec(s); s.loader.exec_module(m); m.update_notes()"

      - name: Validate synchronized source artifacts
        run: |
          python - <<'PY'
          import re
          from pathlib import Path
          readme = Path('README.md').read_text(encoding='utf-8')
          index = Path('index.html').read_text(encoding='utf-8')
          active = Path('article/2active.tex').read_text(encoding='utf-8')
          passive = Path('article/3passive.tex').read_text(encoding='utf-8')
          master = Path('bare_jrnl.tex').read_text(encoding='utf-8')
          bib = Path('egbib_merged_20260711.bib').read_text(encoding='utf-8')
          for doi in ('10.1063/5.0235687', '10.1016/j.optlaseng.2025.109100'):
              if readme.count(doi) != 1 or index.count(doi) != 1 or doi not in bib:
                  raise SystemExit(f'Cross-artifact DOI validation failed: {doi}')
          event_doi = '10.1109/jsen.2024.3468909'
          if readme.lower().count(event_doi) != 1 or index.lower().count(event_doi) != 1 or event_doi not in bib.lower():
              raise SystemExit('Cross-artifact event-camera DOI validation failed')
          if any('2404.05977' in item for item in (readme, index, bib)):
              raise SystemExit('Obsolete event-camera preprint metadata remains')
          for key, source in (
              ('zhangRealTimeScanFreeNLOS2024', active),
              ('zhangSpatialCorrelationNLOS2025', active),
              ('wangEventEnhancedPassiveNLOS2024', passive),
          ):
              if key not in source or bib.count('{' + key + ',') != 1:
                  raise SystemExit(f'Citation/BibTeX consistency failed: {key}')
          if 'through 20 July 2026' not in master:
              raise SystemExit('Survey coverage date was not advanced')
          papers = re.search(r'const\s+papers\s*=\s*\[(.*?)\n\s*\];', index, flags=re.DOTALL)
          stat = re.search(r'<div class="stat"><b>(\d+)</b><span>tracked latest entries</span></div>', index)
          if not papers or not stat:
              raise SystemExit('Website paper-array or statistic missing')
          count = len(re.findall(r'\{cat:"', papers.group(1)))
          if int(stat.group(1)) != count:
              raise SystemExit(f'Website count mismatch: stat={stat.group(1)}, objects={count}')
          print('Guarded source synchronization and consistency validation passed.')
          PY

      - name: Build the updated LaTeX survey
        uses: xu-cheng/latex-action@v3
        with:
          root_file: bare_jrnl.tex
          args: -pdf -file-line-error -halt-on-error -interaction=nonstopmode

      - name: Validate citations, bibliography, and rendered PDF
        run: |
          python -m pip install --quiet pypdf
          python - <<'PY'
          import re
          from pathlib import Path
          from pypdf import PdfReader
          log = Path('bare_jrnl.log').read_text(encoding='utf-8', errors='ignore')
          for pattern in (r'Citation .* undefined', r'There were undefined references', r'undefined citations', r'Fatal error occurred'):
              if re.search(pattern, log, flags=re.IGNORECASE):
                  raise SystemExit(f'LaTeX validation failed: {pattern}')
          pdf = Path('bare_jrnl.pdf')
          if not pdf.exists() or pdf.stat().st_size < 100_000:
              raise SystemExit('bare_jrnl.pdf was not generated or is unexpectedly small')
          reader = PdfReader(str(pdf))
          if len(reader.pages) < 10:
              raise SystemExit('Regenerated survey has an implausibly small page count')
          compact = re.sub(r'[^a-z0-9]+', ' ', '\n'.join((p.extract_text() or '') for p in reader.pages).lower())
          for phrase in ('scan free transient acquisition','spatial correlation super resolution for scan free nlos','event camera passive nlos for moving objects','real time scan free non line of sight imaging','event enhanced passive non line of sight imaging for moving objects with physical embedding'):
              if phrase not in compact:
                  raise SystemExit(f'Expected PDF text missing: {phrase}')
          print(f'Validated {len(reader.pages)} PDF pages.')
          PY

      - name: Commit synchronized artifacts to the pull-request branch
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add README.md index.html article/2active.tex article/3passive.tex bare_jrnl.tex \
            egbib_merged_20260711.bib bare_jrnl.pdf \
            updates/2026-07-19-scanfree-spatial-correlation-citation-trace.md \
            updates/2026-07-20-event-camera-final-venue-correction.md
          git rm -f .automation/nlos-scanfree-event-20260720.trigger \
            .github/workflows/sync_nlos_scanfree_event_pr_20260720.yml \
            .github/workflows/sync_nlos_scanfree_event_20260720.yml \
            scripts/sync_nlos_20260720_scanfree_event.py
          git commit -m 'Integrate scan-free and event-camera NLOS updates'
          git push origin HEAD:${HEAD_BRANCH}
