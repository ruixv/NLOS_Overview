name: Synchronize self-calibrating NLOS inverse rendering

on:
  push:
    branches: [master]
    paths:
      - '.github/workflows/nlos-selfcal-sync.yml'

permissions:
  contents: write

concurrency:
  group: nlos-selfcal-sync
  cancel-in-progress: false

jobs:
  sync-build-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Synchronize public artifacts and bibliography
        run: |
          set -euo pipefail
          python -m pip install bibtexparser==1.4.3
          python -m py_compile scripts/sync_nlos_20260715_selfcal.py scripts/merge_nlos_bibliography.py
          python scripts/sync_nlos_20260715_selfcal.py
          sha256sum README.md index.html article/2active.tex > /tmp/selfcal-before-second.sha
          python scripts/sync_nlos_20260715_selfcal.py
          sha256sum README.md index.html article/2active.tex > /tmp/selfcal-after-second.sha
          diff -u /tmp/selfcal-before-second.sha /tmp/selfcal-after-second.sha
          python scripts/merge_nlos_bibliography.py

          grep -Fq '**Update run: 15 July 2026.**' README.md
          grep -Fq 'https://doi.org/10.1145/3610548.3618140' README.md
          grep -Fq 'ACM TOG / SIGGRAPH Asia 2023' README.md
          test "$(grep -Fo 'Self-Calibrating, Fully Differentiable NLOS Inverse Rendering' README.md | wc -l)" -eq 1
          grep -Fq 'Choi et al.: self-calibrating differentiable NLOS inverse rendering' README.md

          grep -Fq 'Updated 15 July 2026 · 190+ papers' index.html
          grep -Fq 'Last updated: 15 July 2026' index.html
          grep -Fq '<b>96</b><span>tracked latest entries</span>' index.html
          grep -Fq 'https://doi.org/10.1145/3610548.3618140' index.html
          test "$(grep -Fo 'Self-Calibrating, Fully Differentiable NLOS Inverse Rendering' index.html | wc -l)" -eq 1
          grep -Fq 'jointly self-calibrate imaging filters, sensor response, geometry, normals, and albedo' index.html

          grep -Fq 'Self-calibrating differentiable NLOS inverse rendering.' article/2active.tex
          test "$(grep -Fo 'choiSelfCalibratingNLOS2023' article/2active.tex | wc -l)" -eq 2
          grep -Fq 'choiSelfCalibratingNLOS2023' egbib_merged_20260711.bib
          grep -Fq 'Truly missing citation keys: 0' updates/2026-07-11-bibliography-deduplication.md

      - name: Install LaTeX and PDF tools
        run: |
          sudo apt-get update
          sudo apt-get install -y latexmk texlive-latex-extra texlive-fonts-recommended texlive-science texlive-pictures texlive-publishers texlive-bibtex-extra poppler-utils

      - name: Render previous PDF
        run: |
          set -euo pipefail
          test -s bare_jrnl.pdf
          cp bare_jrnl.pdf /tmp/bare_jrnl-before.pdf
          mkdir -p /tmp/render-before
          pdftoppm -png -r 100 /tmp/bare_jrnl-before.pdf /tmp/render-before/page >/dev/null 2>&1
          test "$(find /tmp/render-before -name 'page-*.png' -type f | wc -l)" -gt 0

      - name: Clean-build survey PDF
        run: |
          set -euo pipefail
          rm -f bare_jrnl.pdf bare_jrnl.aux bare_jrnl.bbl bare_jrnl.blg bare_jrnl.log bare_jrnl.out bare_jrnl.toc bare_jrnl.fdb_latexmk bare_jrnl.fls
          latexmk -pdf -interaction=nonstopmode -halt-on-error bare_jrnl.tex

      - name: Validate rebuilt PDF and citation consistency
        run: |
          set -euo pipefail
          test -s bare_jrnl.pdf
          test -s bare_jrnl.bbl
          pdfinfo bare_jrnl.pdf > /tmp/pdfinfo-after.txt
          pdftotext -layout bare_jrnl.pdf /tmp/bare_jrnl.txt
          test -s /tmp/bare_jrnl.txt
          mkdir -p /tmp/render-after
          pdftoppm -png -r 100 bare_jrnl.pdf /tmp/render-after/page >/dev/null 2>&1
          before_pages=$(find /tmp/render-before -name 'page-*.png' -type f | wc -l)
          after_pages=$(find /tmp/render-after -name 'page-*.png' -type f | wc -l)
          test "$after_pages" -ge "$before_pages"
          ! grep -Eiq "Citation .* undefined|There were undefined references|undefined citations" bare_jrnl.log
          ! grep -Eiq "Warning--I didn't find a database entry|Repeated entry" bare_jrnl.blg
          grep -Fq 'choiSelfCalibratingNLOS2023' bare_jrnl.aux
          grep -Fq 'choiSelfCalibratingNLOS2023' bare_jrnl.bbl
          grep -Eiq 'Self-calibrating differentiable NLOS inverse rendering|jointly optimizes virtual-illumination|laser.*sensor temporal response' /tmp/bare_jrnl.txt

      - name: Publish validated synchronization
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          p = Path('updates/2026-07-15-self-calibrating-nlos-consistency.md')
          text = p.read_text(encoding='utf-8')
          staged = '**Build status:** staged for safe GitHub Actions synchronization and clean LaTeX/BibTeX/PDF validation.'
          done = '**Build status:** README, homepage/paper explorer, survey source, merged bibliography, and regenerated PDF are mutually consistent; clean build, citation, bibliography, text-extraction, and page-render checks passed.'
          if staged in text:
              text = text.replace(staged, done, 1)
          elif done not in text:
              text = text.rstrip() + '\n\n' + done + '\n'
          p.write_text(text, encoding='utf-8')
          PY

          rm -f .github/workflows/nlos-selfcal-sync.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Integrate self-calibrating NLOS inverse rendering"
          git fetch origin master
          git rebase origin/master
          git push origin HEAD:master
