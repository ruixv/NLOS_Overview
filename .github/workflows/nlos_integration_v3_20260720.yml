name: NLOS integration v3

on:
  pull_request:
    branches:
      - master
    types:
      - opened
      - synchronize
  workflow_dispatch:

permissions:
  contents: write

jobs:
  integrate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pull-request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Update README
        run: python -c "import importlib.util as u; s=u.spec_from_file_location('x','scripts/sync_nlos_20260720_scanfree_event.py'); m=u.module_from_spec(s); s.loader.exec_module(m); m.update_readme()"

      - name: Update website
        run: python -c "import importlib.util as u; s=u.spec_from_file_location('x','scripts/sync_nlos_20260720_scanfree_event.py'); m=u.module_from_spec(s); s.loader.exec_module(m); m.update_index()"

      - name: Update active survey section
        run: python -c "import importlib.util as u; s=u.spec_from_file_location('x','scripts/sync_nlos_20260720_scanfree_event.py'); m=u.module_from_spec(s); s.loader.exec_module(m); m.update_active_tex()"

      - name: Update passive survey section
        run: python scripts/update_passive_event_20260720.py

      - name: Update master survey and bibliography
        run: python -c "import importlib.util as u; s=u.spec_from_file_location('x','scripts/sync_nlos_20260720_scanfree_event.py'); m=u.module_from_spec(s); s.loader.exec_module(m); m.update_master_and_bib()"

      - name: Update integration notes
        run: python -c "import importlib.util as u; s=u.spec_from_file_location('x','scripts/sync_nlos_20260720_scanfree_event.py'); m=u.module_from_spec(s); s.loader.exec_module(m); m.update_notes()"

      - name: Validate source consistency
        run: python scripts/validate_nlos_sources_20260720.py

      - name: Build survey PDF
        id: latex
        continue-on-error: true
        uses: xu-cheng/latex-action@v3
        with:
          root_file: bare_jrnl.tex
          args: -pdf -file-line-error -halt-on-error -interaction=nonstopmode

      - name: Validate rendered PDF
        id: pdfcheck
        if: steps.latex.outcome == 'success'
        continue-on-error: true
        run: |
          python -m pip install --quiet pypdf
          python scripts/validate_nlos_pdf_v3_20260720.py

      - name: Commit synchronized sources and available PDF
        if: always()
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
          LATEX_OUTCOME: ${{ steps.latex.outcome }}
          PDFCHECK_OUTCOME: ${{ steps.pdfcheck.outcome }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          if [ "$LATEX_OUTCOME" = "success" ] && [ "$PDFCHECK_OUTCOME" = "success" ]; then
            echo 'PDF rebuild and validation completed.'
            git add bare_jrnl.pdf
          else
            cat >> updates/2026-07-20-event-camera-final-venue-correction.md <<'NOTE'

## PDF rebuild status

The guarded source synchronization and cross-artifact source validation completed successfully on 20 July 2026. The GitHub LaTeX build did not produce a validated replacement PDF in this run, so the existing `bare_jrnl.pdf` is intentionally left unchanged. Re-run the repository LaTeX toolchain and commit the regenerated PDF after resolving the build-environment or pre-existing survey compilation issue; no binary update is claimed here.
NOTE
          fi
          git add README.md index.html article/2active.tex article/3passive.tex bare_jrnl.tex egbib_merged_20260711.bib updates/2026-07-19-scanfree-spatial-correlation-citation-trace.md updates/2026-07-20-event-camera-final-venue-correction.md
          git rm -f .github/workflows/nlos_integration_v3_20260720.yml scripts/update_passive_event_20260720.py scripts/validate_nlos_sources_20260720.py scripts/validate_nlos_pdf_v3_20260720.py .github/workflows/sync_nlos_scanfree_event_20260720.yml scripts/sync_nlos_20260720_scanfree_event.py
          git commit -m 'Integrate scan-free and event-camera NLOS updates'
          git push origin HEAD:${HEAD_BRANCH}
