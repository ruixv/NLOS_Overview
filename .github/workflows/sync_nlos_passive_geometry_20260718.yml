name: Sync 18 July 2026 passive NLOS and geometry update

on:
  push:
    branches: [master]
    paths:
      - egbib_20260718_passive_geometry_updates.bib
      - scripts/sync_nlos_20260718_passive_geometry.py
      - .github/workflows/sync_nlos_passive_geometry_20260718.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-nlos-passive-geometry-20260718
  cancel-in-progress: false

jobs:
  sync-build-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out writable branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: master

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Syntax-check and synchronize sources
        run: |
          python -m py_compile scripts/sync_nlos_20260718_passive_geometry.py
          python scripts/sync_nlos_20260718_passive_geometry.py

      - name: Merge and audit bibliography
        run: |
          python -m pip install --disable-pip-version-check bibtexparser==1.4.3
          python scripts/merge_nlos_bibliography.py

      - name: Commit synchronized source artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md index.html article/2active.tex article/3passive.tex article/4datadriven.tex bare_jrnl.tex egbib_merged_20260711.bib updates/2026-07-11-bibliography-deduplication.md updates/2026-07-18-passive-geometry-citation-tracing.md
          if git diff --cached --quiet; then
            echo "Source artifacts already synchronized."
          else
            git commit -m "Integrate passive NLOS citation-tracing update"
            git fetch origin master
            git rebase origin/master
            git push origin HEAD:master
          fi

      - name: Install LaTeX and PDF validation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y latexmk texlive-latex-extra texlive-fonts-recommended texlive-science texlive-pictures texlive-publishers texlive-bibtex-extra poppler-utils

      - name: Clean-build survey PDF
        run: |
          cp bare_jrnl.pdf /tmp/bare_jrnl_before_20260718.pdf
          rm -f bare_jrnl.pdf bare_jrnl.aux bare_jrnl.bbl bare_jrnl.blg bare_jrnl.log bare_jrnl.out bare_jrnl.toc bare_jrnl.fdb_latexmk bare_jrnl.fls
          latexmk -pdf -interaction=nonstopmode -halt-on-error bare_jrnl.tex

      - name: Validate synchronized artifacts
        run: |
          test -s bare_jrnl.pdf
          test -s bare_jrnl.bbl
          pdfinfo bare_jrnl.pdf | grep -E '^Pages:[[:space:]]+[1-9][0-9]*$'
          pdftotext -layout bare_jrnl.pdf bare_jrnl.txt
          mkdir -p /tmp/nlos_pdf_pages_before /tmp/nlos_pdf_pages_after
          pdftoppm -png -r 72 /tmp/bare_jrnl_before_20260718.pdf /tmp/nlos_pdf_pages_before/page >/dev/null 2>&1
          pdftoppm -png -r 72 bare_jrnl.pdf /tmp/nlos_pdf_pages_after/page >/dev/null 2>&1
          test "$(find /tmp/nlos_pdf_pages_before -name 'page-*.png' | wc -l)" -gt 0
          test "$(find /tmp/nlos_pdf_pages_after -name 'page-*.png' | wc -l)" -gt 0
          if grep -Eiq "undefined citations|Citation .* undefined|There were undefined references" bare_jrnl.log; then
            echo "Undefined citations or references detected" >&2
            exit 1
          fi
          if grep -Eiq "Warning--I didn't find a database entry|Repeated entry" bare_jrnl.blg; then
            echo "Missing or repeated BibTeX entries detected" >&2
            exit 1
          fi
          python - <<'PY'
          from pathlib import Path
          import re

          def read(path):
              return Path(path).read_text(encoding="utf-8", errors="ignore")

          def norm(path):
              return re.sub(r"\s+", " ", read(path)).lower()

          readme = read("README.md")
          index = read("index.html")
          active = read("article/2active.tex")
          passive = read("article/3passive.tex")
          learning = read("article/4datadriven.tex")
          bib = read("egbib_merged_20260711.bib")
          pdf = norm("bare_jrnl.txt")
          bbl = norm("bare_jrnl.bbl")

          records = [
              ("Passive non-line-of-sight imaging at 10 meters", "zhouPassiveNLOS10m2025", passive),
              ("Neural Networks Meet Light Transport Physics for Passive Non-Line-of-Sight Imaging Enhancement", "liangHPDIPassiveNLOS2026", learning),
              ("Geometry-Constrained Non-Line-of-Sight Imaging", "liuGeometricConstrainedNLOS2025", active),
              ("Super-field-of-view non-line-of-sight imaging via spatial encoding of a translated point spread function", "liSuperFoVNLOS2026", active),
          ]
          for title, key, section in records:
              if readme.lower().count("[" + title.lower() + "]") != 1:
                  raise SystemExit(f"README entry missing or duplicated: {title}")
              if index.lower().count('title:"' + title.lower() + '"') != 1:
                  raise SystemExit(f"Homepage entry missing or duplicated: {title}")
              if key not in section:
                  raise SystemExit(f"Survey citation missing: {key}")
              if bib.lower().count("{" + key.lower() + ",") != 1:
                  raise SystemExit(f"Bibliography key missing or duplicated: {key}")

          geometry_readme = [line for line in readme.splitlines() if "[Geometry-Constrained Non-Line-of-Sight Imaging]" in line]
          geometry_index = [line for line in index.splitlines() if 'title:"Geometry-Constrained Non-Line-of-Sight Imaging"' in line]
          if len(geometry_readme) != 1 or len(geometry_index) != 1:
              raise SystemExit("Final geometry-constrained record is missing or duplicated")
          for line in geometry_readme + geometry_index:
              if "2026" not in line or "10.1109/TVCG.2026.3684832" not in line:
                  raise SystemExit("Geometry-constrained final venue metadata is missing")
          if "[Geometric Constrained Non-Line-of-Sight Imaging]" in readme or 'title:"Geometric Constrained Non-Line-of-Sight Imaging"' in index:
              raise SystemExit("The preliminary geometry-constrained title remains public")

          displayed = re.search(r'<div class="stat"><b>(\d+)</b><span>tracked latest entries</span></div>', index)
          if not displayed:
              raise SystemExit("Homepage tracked-count stat is missing")
          paper_count = len(re.findall(r'^\s*\{cat:"[^"]+",title:"', index, flags=re.MULTILINE))
          if int(displayed.group(1)) != paper_count:
              raise SystemExit(f"Homepage count mismatch: stat={displayed.group(1)}, objects={paper_count}")

          if "18 July 2026" not in readme or "18 July 2026" not in index:
              raise SystemExit("Public update dates are not synchronized")

          expected_pdf = [
              "long-range passive nlos under severe background",
              "hybrid physics",
              "geometry-constrained joint normal and albedo reconstruction",
              "super-field-of-view reconstruction by translated psfs",
          ]
          for phrase in expected_pdf:
              if phrase not in pdf:
                  raise SystemExit(f"Generated PDF is missing: {phrase}")

          expected_bbl = [
              "passive non-line-of-sight imaging at 10 meters",
              "neural networks meet light transport physics",
              "geometry-constrained non-line-of-sight imaging",
              "super-field-of-view non-line-of-sight imaging",
          ]
          for phrase in expected_bbl:
              if phrase not in bbl:
                  raise SystemExit(f"Generated bibliography is missing: {phrase}")

          if "ieee transactions on visualization and computer graphics" not in bib.lower():
              raise SystemExit("Corrected TVCG bibliography metadata is missing")
          print("18 July 2026 public artifacts, survey, bibliography, and PDF are mutually consistent.")
          PY
          rm bare_jrnl.txt

      - name: Commit regenerated PDF
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bare_jrnl.pdf
          if git diff --cached --quiet; then
            echo "Survey PDF already current."
          else
            git commit -m "Rebuild survey for passive NLOS citation update"
            git fetch origin master
            git rebase origin/master
            git push origin HEAD:master
          fi
