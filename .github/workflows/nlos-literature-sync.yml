name: NLOS literature sync and survey build

on:
  push:
    paths:
      - .github/workflows/nlos-literature-sync.yml
  pull_request:
    paths:
      - updates/nlos-run15-trigger.md
  workflow_dispatch:

concurrency:
  group: nlos-survey-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  sync-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Consolidate and audit bibliography
        run: |
          python -m pip install bibtexparser==1.4.3
          python scripts/sync_nlos_20260711_run15.py
          python scripts/merge_nlos_bibliography.py
          grep -E "Case-insensitive duplicate replacements|Citation-key case normalizations|Truly missing citation keys" updates/2026-07-11-bibliography-deduplication.md
          ! grep -Eq "Truly missing citation keys: [1-9]" updates/2026-07-11-bibliography-deduplication.md
          rm -f updates/2026-07-11-xband-nif-build-diagnostic.md

      - name: Compile and strictly validate survey PDF
        uses: xu-cheng/latex-action@v4
        with:
          root_file: bare_jrnl.tex
          os: debian
          texlive_version: 2026
          extra_system_packages: poppler-utils
          args: -pdf -file-line-error -halt-on-error -interaction=nonstopmode
          post_compile: |
            set -eu
            test -s bare_jrnl.pdf
            test -s bare_jrnl.bbl
            ! grep -Eiq "Citation .* undefined|There were undefined references|undefined citations" bare_jrnl.log
            ! grep -Eiq "Warning--I didn't find a database entry|Repeated entry" bare_jrnl.blg
            grep -Fq '\bibitem{duXBandRadarNLOS2026}' bare_jrnl.bbl
            grep -Fq '\bibitem{zhangNeuralIlluminationFields2026}' bare_jrnl.bbl
            pdfinfo bare_jrnl.pdf > updates/2026-07-11-bare-jrnl-pdfinfo.txt
            pdftotext -layout bare_jrnl.pdf /tmp/bare_jrnl.txt
            test -s /tmp/bare_jrnl.txt
            grep -Fq "Recent Advances on Non-Line-of-Sight Imaging" /tmp/bare_jrnl.txt

      - name: Record successful build status
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          p = Path('updates/2026-07-11-xband-nif-and-bibliography-sync.md')
          text = p.read_text(encoding='utf-8')
          text = re.sub(r'\n\*\*Build result:\*\*.*?\n(?=\n|\Z)', '\n', text, flags=re.S)
          status = (
              "\n**Build result:** successful clean LaTeX/BibTeX rebuild from the "
              "case-normalized, duplicate-free consolidated bibliography. `bare_jrnl.pdf` "
              "was regenerated and validated with `pdfinfo`/`pdftotext`; no undefined "
              "citations, unresolved references, or repeated BibTeX keys were detected, "
              "and both newly integrated records were verified in the generated bibliography.\n"
          )
          p.write_text(text.rstrip() + "\n" + status, encoding='utf-8')
          PY

      - name: Commit synchronized artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md index.html article/1introduction.tex article/5newscenes.tex \
            bare_jrnl.tex bare_jrnl.pdf \
            egbib_20260711_run15_updates.bib egbib_merged_20260711.bib \
            updates/2026-07-11-xband-nif-and-bibliography-sync.md \
            updates/2026-07-11-bibliography-deduplication.md \
            updates/2026-07-11-bare-jrnl-pdfinfo.txt \
            scripts/sync_nlos_20260711_run15.py scripts/merge_nlos_bibliography.py \
            .github/workflows/nlos-literature-sync.yml
          git add -A updates/2026-07-11-xband-nif-build-diagnostic.md 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Rebuild and validate synchronized NLOS survey"
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              git push origin HEAD:${{ github.head_ref }}
            else
              git push origin HEAD:master
            fi
          fi
