name: NLOS literature sync and survey build

# Rebuild after integrating the verified SSCR survey citation and prose.
on:
  push:
    paths:
      - .github/workflows/nlos-literature-sync.yml
  pull_request:
    paths:
      - updates/nlos-run15-trigger.md
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install bibliography parser
        run: python -m pip install bibtexparser==1.4.3

      - name: Apply anchor-checked literature sync and citation-key audit
        run: |
          python scripts/sync_nlos_20260711_run15.py
          python scripts/merge_nlos_bibliography.py
          grep -E "Case-insensitive duplicate replacements|Citation-key case normalizations|Truly missing citation keys" updates/2026-07-11-bibliography-deduplication.md

      - name: Install LaTeX toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y latexmk texlive-latex-extra texlive-fonts-recommended texlive-science texlive-pictures texlive-publishers texlive-bibtex-extra poppler-utils

      - name: Rebuild and strictly validate survey PDF
        id: build
        shell: bash
        run: |
          set +e
          rm -f bare_jrnl.pdf bare_jrnl.aux bare_jrnl.bbl bare_jrnl.blg bare_jrnl.log bare_jrnl.out bare_jrnl.toc
          latexmk -pdf -interaction=nonstopmode bare_jrnl.tex > /tmp/latexmk.log 2>&1
          latex_rc=$?
          pdf_ok=false
          validation_reason="latexmk failed"

          if [ "$latex_rc" -eq 0 ] && [ -s bare_jrnl.pdf ] && [ -s bare_jrnl.bbl ]; then
            pdfinfo bare_jrnl.pdf > /tmp/pdfinfo.txt 2>&1
            info_rc=$?
            pdftotext -layout bare_jrnl.pdf /tmp/bare_jrnl.txt > /tmp/pdftotext.log 2>&1
            text_rc=$?

            undefined=false
            if grep -Eiq "Citation .* undefined|There were undefined references|undefined citations" bare_jrnl.log 2>/dev/null; then
              undefined=true
            fi
            if grep -Eiq "Warning--I didn't find a database entry|Repeated entry" bare_jrnl.blg 2>/dev/null; then
              undefined=true
            fi
            if grep -Eq "Truly missing citation keys: [1-9]" updates/2026-07-11-bibliography-deduplication.md; then
              undefined=true
            fi

            integrated=false
            if python - <<'PY'
          from pathlib import Path
          text = " ".join(Path('/tmp/bare_jrnl.txt').read_text(encoding='utf-8', errors='ignore').split()).casefold()
          required = (
              'recent advances on non-line-of-sight imaging',
              'x-band radar non-line-of-sight imaging',
              'neural illumination fields',
          )
          raise SystemExit(0 if all(token in text for token in required) else 1)
          PY
            then
              integrated=true
            fi

            if [ "$info_rc" -eq 0 ] && [ "$text_rc" -eq 0 ] && [ -s /tmp/bare_jrnl.txt ] \
              && [ "$undefined" = false ] && [ "$integrated" = true ]; then
              pdf_ok=true
              validation_reason="clean final log, no missing/repeated BibTeX records, new references present in PDF text"
            else
              validation_reason="PDF/reference validation failed (undefined=$undefined, integrated=$integrated, pdfinfo=$info_rc, pdftotext=$text_rc)"
            fi
          fi

          echo "latex_rc=$latex_rc" >> "$GITHUB_OUTPUT"
          echo "pdf_ok=$pdf_ok" >> "$GITHUB_OUTPUT"
          echo "validation_reason=$validation_reason" >> "$GITHUB_OUTPUT"

          if [ "$pdf_ok" != true ]; then
            {
              echo '# LaTeX build diagnostic (11 July 2026, case-normalized merged bibliography)'
              echo
              echo "latexmk exit code: $latex_rc"
              echo
              echo "validation: $validation_reason"
              echo
              echo '```text'
              tail -n 220 /tmp/latexmk.log 2>/dev/null || true
              echo '```'
              if [ -f bare_jrnl.blg ]; then
                echo
                echo '## BibTeX log tail'
                echo
                echo '```text'
                tail -n 160 bare_jrnl.blg || true
                echo '```'
              fi
            } > updates/2026-07-11-xband-nif-build-diagnostic.md
          else
            rm -f updates/2026-07-11-xband-nif-build-diagnostic.md
          fi
          exit 0

      - name: Record build status
        env:
          PDF_OK: ${{ steps.build.outputs.pdf_ok }}
          LATEX_RC: ${{ steps.build.outputs.latex_rc }}
          VALIDATION_REASON: ${{ steps.build.outputs.validation_reason }}
        run: |
          python - <<'PY'
          from pathlib import Path
          import os
          import re

          p = Path('updates/2026-07-11-xband-nif-and-bibliography-sync.md')
          text = p.read_text(encoding='utf-8')
          text = re.sub(r'\n\*\*Build result:\*\*.*?\n(?=\n|\Z)', '\n', text, flags=re.S)
          if os.environ.get('PDF_OK') == 'true':
              status = (
                  "\n**Build result:** successful clean LaTeX/BibTeX rebuild from the "
                  "case-normalized, duplicate-free consolidated bibliography. `bare_jrnl.pdf` "
                  "was regenerated; `pdfinfo`/`pdftotext` passed, the final LaTeX log contains no "
                  "undefined citations/references, BibTeX reports no missing or repeated keys, "
                  "and both new paper titles were verified in the PDF text "
                  f"(latexmk exit code {os.environ.get('LATEX_RC', '0')}).\n"
              )
          else:
              status = (
                  "\n**Build result:** source synchronization and citation-key-normalized "
                  "bibliography consolidation succeeded, but no strictly validated replacement "
                  "PDF was committed. The prior PDF was preserved. "
                  f"Reason: {os.environ.get('VALIDATION_REASON', 'unknown')} "
                  f"(latexmk exit code {os.environ.get('LATEX_RC', 'unknown')}). See "
                  "`updates/2026-07-11-xband-nif-build-diagnostic.md`.\n"
              )
          p.write_text(text.rstrip() + "\n" + status, encoding='utf-8')
          PY

      - name: Commit synchronized artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md index.html article/1introduction.tex article/5newscenes.tex bare_jrnl.tex \
            egbib_20260711_run15_updates.bib egbib_merged_20260711.bib \
            updates/2026-07-11-xband-nif-and-bibliography-sync.md \
            updates/2026-07-11-bibliography-deduplication.md \
            scripts/sync_nlos_20260711_run15.py scripts/merge_nlos_bibliography.py \
            .github/workflows/nlos-literature-sync.yml
          git add -A updates/2026-07-11-xband-nif-build-diagnostic.md 2>/dev/null || true
          if [ "${{ steps.build.outputs.pdf_ok }}" = "true" ]; then
            git add bare_jrnl.pdf
          else
            git restore --staged bare_jrnl.pdf 2>/dev/null || true
            git checkout -- bare_jrnl.pdf 2>/dev/null || true
          fi
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Validate and rebuild normalized NLOS survey"
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              git push origin HEAD:${{ github.head_ref }}
            else
              git push origin HEAD:master
            fi
          fi
