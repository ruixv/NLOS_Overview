name: Final 20 July NLOS synchronization

on:
  push:
    branches:
      - master
    paths:
      - '.github/workflows/sync_nlos_scanfree_event_20260720.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-build-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Apply guarded source synchronization
        id: sync
        run: python scripts/sync_nlos_20260720_final.py

      - name: Attempt clean survey PDF rebuild
        id: latex
        continue-on-error: true
        uses: xu-cheng/latex-action@v3
        with:
          root_file: bare_jrnl.tex
          args: -pdf -file-line-error -halt-on-error -interaction=nonstopmode

      - name: Validate regenerated PDF
        id: pdfcheck
        if: steps.latex.outcome == 'success'
        continue-on-error: true
        run: |
          python -m pip install --quiet pypdf
          python - <<'PY'
          import re
          from pathlib import Path
          from pypdf import PdfReader

          log = Path('bare_jrnl.log').read_text(encoding='utf-8', errors='ignore')
          for pattern in (r'Citation .* undefined', r'There were undefined references', r'Fatal error occurred'):
              if re.search(pattern, log, flags=re.IGNORECASE):
                  raise SystemExit(f'LaTeX validation failed: {pattern}')
          pdf = Path('bare_jrnl.pdf')
          if not pdf.exists() or pdf.stat().st_size < 100000:
              raise SystemExit('Regenerated PDF is missing or unexpectedly small')
          reader = PdfReader(str(pdf))
          if len(reader.pages) < 10:
              raise SystemExit('Regenerated PDF has an implausible page count')
          compact = re.sub(r'[^a-z0-9]+', ' ', '\n'.join((p.extract_text() or '') for p in reader.pages).lower())
          for phrase in ('scan free transient acquisition', 'event camera passive nlos', 'polarization speckle single pixel nlos'):
              if phrase not in compact:
                  raise SystemExit(f'Expected PDF text missing: {phrase}')
          print(f'Validated {len(reader.pages)} PDF pages.')
          PY

      - name: Commit synchronized sources and validated binary when available
        if: steps.sync.outcome == 'success'
        env:
          LATEX_OUTCOME: ${{ steps.latex.outcome }}
          PDFCHECK_OUTCOME: ${{ steps.pdfcheck.outcome }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          if [ "$LATEX_OUTCOME" = "success" ] && [ "$PDFCHECK_OUTCOME" = "success" ]; then
            git add bare_jrnl.pdf
            printf '\nPDF rebuild and rendered-text validation completed successfully on 20 July 2026.\n' >> updates/2026-07-20-event-camera-final-venue-correction.md
          else
            cat >> updates/2026-07-20-event-camera-final-venue-correction.md <<'NOTE'

## PDF rebuild status

The guarded source synchronization and cross-artifact source validation completed successfully on 20 July 2026. The available GitHub LaTeX run did not produce a validated replacement PDF, so the existing `bare_jrnl.pdf` is intentionally left unchanged. A later clean LaTeX build should regenerate and commit the binary; no PDF update is claimed by this commit.
NOTE
          fi
          git add README.md index.html article/2active.tex article/3passive.tex bare_jrnl.tex egbib_merged_20260711.bib egbib_20260720_polarization_single_pixel.bib updates/2026-07-19-scanfree-spatial-correlation-citation-trace.md updates/2026-07-20-event-camera-final-venue-correction.md
          git rm -f .github/workflows/sync_nlos_scanfree_event_20260720.yml scripts/sync_nlos_20260720_scanfree_event.py scripts/sync_nlos_20260720_final.py
          git commit -m 'Integrate scan-free, event-camera, and polarization NLOS updates'
          git push origin HEAD:master
