name: Sync 19 July 2026 radar THz and ptychography citation trace

on:
  push:
    branches: [master]
    paths:
      - egbib_20260719_radar_operator_updates.bib
      - egbib_20260719_ptycho_venue_updates.bib
      - scripts/sync_nlos_20260719_radar_operator.py
      - updates/2026-07-19-radar-operator-citation-trace.md
      - updates/2026-07-19-ptycho-and-venue-followup.md
      - .github/workflows/sync_nlos_radar_operator_20260719.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-nlos-radar-operator-20260719
  cancel-in-progress: false

jobs:
  sync-build-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out writable branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: master

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Synchronize public and survey artifacts
        run: python scripts/sync_nlos_20260719_radar_operator.py

      - name: Merge and audit bibliography
        run: |
          python -m pip install --disable-pip-version-check bibtexparser==1.4.3
          python scripts/merge_nlos_bibliography.py

      - name: Commit synchronized source artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md index.html article/4datadriven.tex article/5newscenes.tex bare_jrnl.tex egbib_merged_20260711.bib updates/2026-07-11-bibliography-deduplication.md updates/2026-07-19-radar-operator-citation-trace.md updates/2026-07-19-ptycho-and-venue-followup.md
          if git diff --cached --quiet; then
            echo "Source artifacts already synchronized."
          else
            git commit -m "Integrate radar THz and ptychographic NLOS citation trace"
            git fetch origin master
            git rebase origin/master
            git push origin HEAD:master
          fi

      - name: Install LaTeX and PDF validation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y latexmk texlive-latex-extra texlive-fonts-recommended texlive-science texlive-pictures texlive-publishers texlive-bibtex-extra poppler-utils

      - name: Clean-build survey PDF
        run: |
          cp bare_jrnl.pdf /tmp/bare_jrnl_before_radar_ptycho_20260719.pdf
          rm -f bare_jrnl.pdf bare_jrnl.aux bare_jrnl.bbl bare_jrnl.blg bare_jrnl.log bare_jrnl.out bare_jrnl.toc bare_jrnl.fdb_latexmk bare_jrnl.fls
          latexmk -pdf -interaction=nonstopmode -halt-on-error bare_jrnl.tex

      - name: Validate synchronized artifacts
        run: |
          test -s bare_jrnl.pdf
          test -s bare_jrnl.bbl
          test -s /tmp/bare_jrnl_before_radar_ptycho_20260719.pdf
          pdfinfo bare_jrnl.pdf | grep -E '^Pages:[[:space:]]+[1-9][0-9]*$'
          pdftotext -layout bare_jrnl.pdf bare_jrnl.txt
          mkdir -p /tmp/nlos_pdf_before /tmp/nlos_pdf_after
          pdftoppm -png -r 72 /tmp/bare_jrnl_before_radar_ptycho_20260719.pdf /tmp/nlos_pdf_before/page >/dev/null 2>&1
          pdftoppm -png -r 72 bare_jrnl.pdf /tmp/nlos_pdf_after/page >/dev/null 2>&1
          test "$(find /tmp/nlos_pdf_before -name 'page-*.png' | wc -l)" -gt 0
          test "$(find /tmp/nlos_pdf_after -name 'page-*.png' | wc -l)" -gt 0
          if grep -Eiq "undefined citations|Citation .* undefined|There were undefined references" bare_jrnl.log; then
            echo "Undefined citations or references detected" >&2
            exit 1
          fi
          if grep -Eiq "Warning--I didn't find a database entry|Repeated entry" bare_jrnl.blg; then
            echo "Missing or repeated BibTeX entries detected" >&2
            exit 1
          fi
          python - <<'PY'
          from pathlib import Path
          import re

          def read(path):
              return Path(path).read_text(encoding="utf-8", errors="ignore")

          def normalized(path):
              return re.sub(r"\s+", " ", read(path)).lower()

          readme = read("README.md")
          index = read("index.html")
          learning = read("article/4datadriven.tex")
          newscenes = read("article/5newscenes.tex")
          master = read("bare_jrnl.tex")
          bib = read("egbib_merged_20260711.bib")
          pdf = normalized("bare_jrnl.txt")
          bbl = read("bare_jrnl.bbl").lower()

          records = [
              ("RM Operator Learning-driven Non-line-of-sight 3D Imaging Method for Millimeter Wave Radar", "chenRMOperatorMmWaveNLOS2026"),
              ("Learning to See Around Corners: A Deep Unfolding Framework for Terahertz Radar Non-Line-of-Sight 3D Imaging", "chenDeepUnfoldingTHzNLOS2026"),
              ("Ptychography-enhanced correlography for non-line-of-sight imaging", "liuPtychographyCorrelographyNLOS2026"),
          ]
          for title, key in records:
              if readme.count("[" + title + "]") != 1:
                  raise SystemExit(f"README entry missing or duplicated: {title}")
              if index.count('title:"' + title + '"') != 1:
                  raise SystemExit(f"Homepage entry missing or duplicated: {title}")
              if key not in newscenes:
                  raise SystemExit(f"New-scenes citation missing: {key}")
              if bib.lower().count("{" + key.lower() + ",") != 1:
                  raise SystemExit(f"Bibliography key missing or duplicated: {key}")
              if key.lower() not in bbl:
                  raise SystemExit(f"Generated bibliography does not cite: {key}")

          generalizable = "Generalizable Non-Line-of-Sight Imaging with Learnable Physical Priors"
          if readme.count("[" + generalizable + "]") != 1 or "| ICCV 2025 |" not in readme:
              raise SystemExit("README final-venue correction missing")
          if index.count('title:"' + generalizable + '"') != 1 or 'venue:"ICCV 2025"' not in index:
              raise SystemExit("Homepage final-venue correction missing")
          if "final ICCV 2025 framework with learnable physical priors" not in learning:
              raise SystemExit("Survey final-venue sentence missing")
          if bib.lower().count("{sungeneralizable2025,") != 1 or "international conference on computer vision" not in bib.lower():
              raise SystemExit("Final ICCV bibliography override missing")

          if "through 19 july 2026" not in master.lower():
              raise SystemExit("Master survey coverage date was not advanced to 19 July 2026")
          if "radar/thz/ptychography citation trace integrates" not in master.lower():
              raise SystemExit("Master integration marker missing")

          paper_count = len(re.findall(r'^\s*\{cat:"[^"]+",title:"', index, flags=re.MULTILINE))
          match = re.search(r'<div class="stat"><b>(\d+)</b><span>tracked latest entries</span></div>', index)
          if not match or int(match.group(1)) != paper_count:
              raise SystemExit("Homepage tracked-entry count does not match the paper array")

          expected_pdf_phrases = [
              "operator-learned range migration for mmwave nlos",
              "deep-unfolded sub-thz radar imaging",
              "ptychography-enhanced steady-state correlography",
              "final iccv 2025 framework with learnable physical priors",
          ]
          for phrase in expected_pdf_phrases:
              if phrase not in pdf:
                  raise SystemExit(f"Generated PDF is missing: {phrase}")

          print(f"Radar/THz/ptychography artifacts are mutually consistent across {paper_count} homepage entries.")
          PY
          rm bare_jrnl.txt

      - name: Commit regenerated PDF
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bare_jrnl.pdf
          if git diff --cached --quiet; then
            echo "Survey PDF already current."
            exit 0
          fi
          git commit -m "Rebuild survey for radar THz and ptychographic NLOS"
          git fetch origin master
          git rebase origin/master
          git push origin HEAD:master
