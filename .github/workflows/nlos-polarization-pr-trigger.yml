name: Validate and publish pending NLOS survey synchronization

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: nlos-consumer-tof-sync
  cancel-in-progress: false

jobs:
  sync-build-publish:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Synchronize sources
        run: |
          set -euo pipefail
          python -m pip install bibtexparser==1.4.3
          python -m py_compile \
            scripts/sync_nlos_20260712_initial_access.py \
            scripts/sync_nlos_20260713_consumer_tof.py \
            scripts/sync_nlos_20260713_passive_polarization.py \
            scripts/merge_nlos_bibliography.py
          python scripts/sync_nlos_20260712_initial_access.py
          python scripts/sync_nlos_20260713_consumer_tof.py
          python scripts/sync_nlos_20260713_passive_polarization.py
          python scripts/merge_nlos_bibliography.py
          grep -Fq "Enhancing Passive Non-Line-of-Sight Imaging Using Polarization Cues" README.md
          grep -Fq "Enhancing Passive Non-Line-of-Sight Imaging Using Polarization Cues" index.html
          grep -Fq '<b>92</b><span>tracked latest entries</span>' index.html
          grep -Fq 'Polarization-conditioned passive transport.' article/3passive.tex
          grep -Fq '1911.12906' egbib_merged_20260711.bib
          grep -Fq 'Truly missing citation keys: 0' updates/2026-07-11-bibliography-deduplication.md

      - name: Install LaTeX and PDF tools
        run: |
          sudo apt-get update
          sudo apt-get install -y latexmk texlive-latex-extra texlive-fonts-recommended texlive-science texlive-pictures texlive-publishers texlive-bibtex-extra poppler-utils

      - name: Clean-build survey PDF
        run: |
          set -euo pipefail
          test -s bare_jrnl.pdf
          cp bare_jrnl.pdf /tmp/bare_jrnl-before.pdf
          mkdir -p /tmp/render-before
          pdftoppm -png -r 100 /tmp/bare_jrnl-before.pdf /tmp/render-before/page >/dev/null 2>&1
          rm -f bare_jrnl.pdf bare_jrnl.aux bare_jrnl.bbl bare_jrnl.blg bare_jrnl.log bare_jrnl.out bare_jrnl.toc bare_jrnl.fdb_latexmk bare_jrnl.fls
          latexmk -pdf -interaction=nonstopmode -halt-on-error bare_jrnl.tex
          test -s bare_jrnl.pdf
          test -s bare_jrnl.bbl

      - name: Validate rebuilt PDF and citations
        run: |
          set -euo pipefail
          pdfinfo bare_jrnl.pdf > /tmp/pdfinfo-after.txt
          pdftotext -layout bare_jrnl.pdf /tmp/bare_jrnl.txt
          test -s /tmp/bare_jrnl.txt
          mkdir -p /tmp/render-after
          pdftoppm -png -r 100 bare_jrnl.pdf /tmp/render-after/page >/dev/null 2>&1
          after_pages=$(find /tmp/render-after -name 'page-*.png' -type f | wc -l)
          test "$after_pages" -gt 0
          ! grep -Eiq "Citation .* undefined|There were undefined references|undefined citations" bare_jrnl.log
          ! grep -Eiq "Warning--I didn't find a database entry|Repeated entry" bare_jrnl.blg
          for key in tornielliInitialAccessNLOS2025 caligiuriNIGHT2024 wuMiniaturizedTCSPC2024 tanakaPolarizedNonLineofSightImaging2020; do
            grep -Fq "$key" bare_jrnl.aux
            grep -Fq "$key" bare_jrnl.bbl
          done
          python - <<'PY'
          from pathlib import Path
          import re
          raw = Path('/tmp/bare_jrnl.txt').read_text(encoding='utf-8', errors='ignore').casefold()
          compact = re.sub(r'[^a-z0-9]+', '', raw)
          required = (
              'polarizationconditionedpassivetransport',
              'enhancingpassivenonlineofsightimagingusingpolarizationcues',
          )
          missing = [token for token in required if token not in compact]
          if missing:
              raise SystemExit(f'Missing normalized PDF tokens: {missing}')
          PY

      - name: Record success and publish artifacts
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          statuses = {
              'updates/2026-07-13-passive-polarization-nlos-update.md': (
                  'successful clean LaTeX/BibTeX rebuild. README, homepage paper explorer, 2019 timeline, '
                  'passive-survey narrative, canonical BibTeX metadata, duplicate-free merged bibliography, and '
                  '`bare_jrnl.pdf` consistently include the passive polarization work. The same run completed the '
                  'pending 6G initial-access, commodity-iToF, and compact-TCSPC integrations. PDF text extraction, '
                  'page rendering, citation, and duplicate-entry checks passed.'),
              'updates/2026-07-13-consumer-tof-and-tcspc-update.md': (
                  'successful source synchronization and clean survey rebuild. README, homepage, timelines, survey '
                  'narrative, canonical BibTeX records, merged bibliography, and `bare_jrnl.pdf` now consistently '
                  'include NIGHT and the compact TCSPC module.'),
              'updates/2026-07-12-6g-initial-access-nlos-imaging-update.md': (
                  'successful source synchronization and clean survey rebuild. README, homepage, timeline, radar/RF '
                  'survey narrative, canonical BibTeX record, merged bibliography, and `bare_jrnl.pdf` now '
                  'consistently include the 6G initial-access NLOS imaging work.'),
          }
          for name, status in statuses.items():
              p = Path(name)
              text = p.read_text(encoding='utf-8')
              text = re.sub(r'\n\*\*Build result:\*\*.*?(?=\n\n|\Z)', '', text, flags=re.S)
              p.write_text(text.rstrip() + '\n\n**Build result:** ' + status + '\n', encoding='utf-8')
          PY
          rm -f .github/workflows/nlos-consumer-tof-sync.yml
          rm -f .github/workflows/nlos-polarization-pr-trigger.yml
          rm -f updates/.trigger-passive-polarization-sync.md
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Integrate passive polarization and pending NLOS updates"
          git push origin HEAD:master
