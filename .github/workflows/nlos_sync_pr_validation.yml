name: NLOS sync PR validation

on:
  pull_request:
    branches: [master]
    paths:
      - 'egbib_*.bib'
      - 'scripts/*.py'
      - '.github/workflows/nlos_sync_pr_validation.yml'
      - 'updates/*.md'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: nlos-sync-pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  sync-build-validate:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Check out writable head branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || 'master' }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Apply guarded literature synchronizers
        id: synchronize
        run: |
          set -euo pipefail
          exec > >(tee -a /tmp/nlos-sync.log) 2>&1
          synchronizers=(
            scripts/prepare_nlos_20260718_geometry_venue.py
            scripts/sync_nlos_20260718_passive_geometry.py
            scripts/sync_nlos_20260718_core_citation.py
            scripts/finalize_nlos_20260718_public_counts.py
          )
          for f in "${synchronizers[@]}"; do
            test -f "$f"
            echo "===== $f ====="
            python -m py_compile "$f"
            python "$f"
          done
          python -m pip install --disable-pip-version-check bibtexparser==1.4.3
          python scripts/merge_nlos_bibliography.py

      - name: Upload synchronization diagnostics
        if: failure() && steps.synchronize.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: nlos-sync-diagnostics
          path: /tmp/nlos-sync.log
          if-no-files-found: error
          retention-days: 7

      - name: Install LaTeX and PDF validation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y latexmk texlive-latex-extra texlive-fonts-recommended texlive-science texlive-pictures texlive-publishers texlive-bibtex-extra poppler-utils

      - name: Clean-build and validate survey
        id: build
        run: |
          set -euo pipefail
          exec > >(tee -a /tmp/nlos-build.log) 2>&1
          cp bare_jrnl.pdf /tmp/bare_jrnl_before.pdf
          rm -f bare_jrnl.pdf bare_jrnl.aux bare_jrnl.bbl bare_jrnl.blg bare_jrnl.log bare_jrnl.out bare_jrnl.toc bare_jrnl.fdb_latexmk bare_jrnl.fls
          latexmk -pdf -interaction=nonstopmode -halt-on-error bare_jrnl.tex
          test -s bare_jrnl.pdf
          test -s bare_jrnl.bbl
          pdfinfo bare_jrnl.pdf | grep -E '^Pages:[[:space:]]+[1-9][0-9]*$'
          pdftotext -layout bare_jrnl.pdf /tmp/bare_jrnl.txt
          mkdir -p /tmp/nlos_pdf_before /tmp/nlos_pdf_after
          pdftoppm -png -r 72 /tmp/bare_jrnl_before.pdf /tmp/nlos_pdf_before/page >/dev/null 2>&1
          pdftoppm -png -r 72 bare_jrnl.pdf /tmp/nlos_pdf_after/page >/dev/null 2>&1
          test "$(find /tmp/nlos_pdf_before -name 'page-*.png' | wc -l)" -gt 0
          test "$(find /tmp/nlos_pdf_after -name 'page-*.png' | wc -l)" -gt 0
          if grep -Eiq "undefined citations|Citation .* undefined|There were undefined references" bare_jrnl.log; then
            echo 'Undefined citations or references detected' >&2
            exit 1
          fi
          if grep -Eiq "Warning--I didn't find a database entry|Repeated entry" bare_jrnl.blg; then
            echo 'Missing or repeated BibTeX entries detected' >&2
            exit 1
          fi
          python - <<'PY'
          from pathlib import Path
          import re

          def read(path):
              return Path(path).read_text(encoding='utf-8', errors='ignore')

          files = {
              'readme': read('README.md'),
              'index': read('index.html'),
              'active': read('article/2active.tex'),
              'passive': read('article/3passive.tex'),
              'learning': read('article/4datadriven.tex'),
              'new': read('article/5newscenes.tex'),
              'main': read('bare_jrnl.tex'),
              'bib': read('egbib_merged_20260711.bib'),
              'bbl': read('bare_jrnl.bbl'),
              'pdf': read('/tmp/bare_jrnl.txt'),
          }
          source = '\n'.join(files[k] for k in ('active', 'passive', 'learning', 'new'))
          records = [
              ('Passive non-line-of-sight imaging at 10 meters', 'zhouPassiveNLOS10m2025'),
              ('Neural Networks Meet Light Transport Physics for Passive Non-Line-of-Sight Imaging Enhancement', 'liangHPDIPassiveNLOS2026'),
              ('Super-field-of-view non-line-of-sight imaging via spatial encoding of a translated point spread function', 'liSuperFoVNLOS2026'),
              ('Adaptive Spiral Scanning for Confocal Non-Line-of-Sight Imaging', 'oyamaAdaptiveSpiralNLOS2026'),
              ('Submillimeter non-line-of-sight ranging and imaging via cost-effective FMCW interferometry', 'liangFMCWNLOS2026'),
              ('Breaking the speed-resolution trade-off in 3.3-km non-line-of-sight imaging using scanning-free laser reflective tomography', 'wangLaserReflectiveTomography2026'),
              ('Non-confocal non-line-of-sight imaging using frequency-domain phase compensation with the reference function', 'yuNonconfocalPhaseCompensation2026'),
              ('Structure-guided adaptive total variation for parameter-free passive non-line-of-sight imaging', 'zhangStructureGuidedATV2026'),
              ('Non-Line-of-Sight Imaging via Sparse Bayesian Learning Deconvolution', 'tianSparseBayesianNLOS2026'),
              ('Non-Line-of-Sight Single-Pixel Imaging Using Polarization Speckle Modulation', 'zhouPolarizationSpeckleNLOS2026'),
              ('High-resolution Fourier single-pixel non-line-of-sight imaging employing diffusion model', 'fuFourierSinglePixelDiffusion2026'),
              ('Multiple-object passive non-line-of-sight imaging', 'chenMultipleObjectPassiveNLOS2026'),
          ]
          for title, key in records:
              if files['readme'].lower().count('[' + title.lower() + ']') != 1:
                  raise SystemExit(f'README entry missing or duplicated: {title}')
              if files['index'].lower().count('title:"' + title.lower() + '"') != 1:
                  raise SystemExit(f'Homepage entry missing or duplicated: {title}')
              if key not in source:
                  raise SystemExit(f'Survey citation missing: {key}')
              if files['bib'].lower().count('{' + key.lower() + ',') != 1:
                  raise SystemExit(f'Bibliography key missing or duplicated: {key}')

          geometry_title = 'Geometry-Constrained Non-Line-of-Sight Imaging'
          geometry_key = 'liuGeometricConstrainedNLOS2025'
          geometry_lines = [line for line in files['readme'].splitlines() if '[' + geometry_title + ']' in line]
          if not geometry_lines:
              raise SystemExit('Final geometry-constrained README records are missing')
          for line in geometry_lines:
              if '10.1109/TVCG.2026.3684832' not in line or 'IEEE TVCG 2026' not in line or '| 2026 |' not in line:
                  raise SystemExit('A geometry-constrained README record retains preliminary metadata')
          if '[Geometric Constrained Non-Line-of-Sight Imaging]' in files['readme']:
              raise SystemExit('Preliminary geometry-constrained title remains public')
          if files['index'].lower().count('title:"' + geometry_title.lower() + '"') != 1:
              raise SystemExit('Final geometry-constrained homepage record is missing or duplicated')
          if geometry_key not in source or files['bib'].lower().count('{' + geometry_key.lower() + ',') != 1:
              raise SystemExit('Geometry-constrained survey or bibliography record is inconsistent')

          displayed = re.search(r'<div class="stat"><b>(\d+)</b><span>tracked latest entries</span></div>', files['index'])
          if not displayed:
              raise SystemExit('Homepage tracked-count stat is missing')
          paper_count = len(re.findall(r'^\s*\{cat:"[^"]+",title:"', files['index'], flags=re.MULTILINE))
          if int(displayed.group(1)) != paper_count:
              raise SystemExit(f'Homepage count mismatch: stat={displayed.group(1)}, objects={paper_count}')

          if '18 July 2026' not in files['readme'] or '18 July 2026' not in files['index']:
              raise SystemExit('Public update dates are not synchronized')
          if 'advances from 2022 through 18 July 2026' not in files['main']:
              raise SystemExit('Survey update horizon is not explicit')

          normalized_pdf = re.sub(r'\s+', ' ', files['pdf']).lower()
          expected_pdf = [
              'adaptive spiral relay-wall sampling',
              'cost-effective fmcw interferometry',
              'scanning-free laser reflective tomography',
              'reference-function phase compensation',
              'sparse bayesian transient restoration',
              'structure-guided adaptive total variation',
              'polarization-speckle single-pixel imaging',
              'diffusion-prior fourier single-pixel imaging',
              'multi-object passive reconstruction',
          ]
          for phrase in expected_pdf:
              if phrase not in normalized_pdf:
                  raise SystemExit(f'Generated PDF is missing: {phrase}')

          normalized_bbl = re.sub(r'[^a-z0-9]+', ' ', re.sub(r'\s+', ' ', files['bbl']).lower())
          for title, _ in records + [(geometry_title, geometry_key)]:
              words = re.sub(r'[^a-z0-9]+', ' ', title.lower()).strip().split()
              probe = ' '.join(words[: min(6, len(words))])
              if probe not in normalized_bbl:
                  raise SystemExit(f'Generated bibliography is missing: {title}')

          print('18 July 2026 README, homepage, survey sources, bibliography, and regenerated PDF are mutually consistent.')
          PY

      - name: Upload LaTeX build diagnostics
        if: failure() && steps.build.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: nlos-build-diagnostics
          path: |
            /tmp/nlos-build.log
            /tmp/bare_jrnl.txt
            bare_jrnl.log
            bare_jrnl.blg
            bare_jrnl.bbl
          if-no-files-found: warn
          retention-days: 7

      - name: Upload synchronized survey artifacts
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: nlos-generated-artifacts
          path: |
            README.md
            index.html
            article/2active.tex
            article/3passive.tex
            article/4datadriven.tex
            article/5newscenes.tex
            bare_jrnl.tex
            egbib_merged_20260711.bib
            bare_jrnl.pdf
            updates/2026-07-18-passive-geometry-citation-tracing.md
            updates/2026-07-18-core-citation-and-modality-update.md
          if-no-files-found: error
          retention-days: 7

      - name: Commit synchronized sources and regenerated PDF to the PR branch
        id: commit
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          exec > >(tee -a /tmp/nlos-commit.log) 2>&1
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add README.md index.html article/2active.tex article/3passive.tex article/4datadriven.tex article/5newscenes.tex bare_jrnl.tex egbib_merged_20260711.bib bare_jrnl.pdf updates
          if git diff --cached --quiet; then
            echo 'All artifacts already synchronized.'
          else
            git commit -m 'Synchronize 18 July NLOS literature and rebuild survey'
            git push --force-with-lease origin HEAD:${{ github.head_ref }}
          fi

      - name: Upload branch-update diagnostics
        if: failure() && steps.commit.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: nlos-commit-diagnostics
          path: /tmp/nlos-commit.log
          if-no-files-found: error
          retention-days: 7
