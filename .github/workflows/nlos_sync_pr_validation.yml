name: NLOS sync PR validation

on:
  pull_request:
    branches: [master]
    paths:
      - 'egbib_*.bib'
      - 'scripts/sync_nlos_*.py'
      - '.github/workflows/nlos_sync_pr_validation.yml'
      - 'updates/*.md'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: nlos-sync-pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  sync-build-validate:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Check out writable head branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || 'master' }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Apply guarded literature synchronizers
        id: synchronize
        run: |
          set -o pipefail
          : > /tmp/nlos-sync.log
          for f in scripts/sync_nlos_20260717_*.py; do
            echo "===== $f =====" | tee -a /tmp/nlos-sync.log
            python -m py_compile "$f" 2>&1 | tee -a /tmp/nlos-sync.log
            python "$f" 2>&1 | tee -a /tmp/nlos-sync.log
          done
          python -m pip install --disable-pip-version-check bibtexparser==1.4.3 2>&1 | tee -a /tmp/nlos-sync.log
          python scripts/merge_nlos_bibliography.py 2>&1 | tee -a /tmp/nlos-sync.log

      - name: Upload synchronization diagnostics
        if: failure() && steps.synchronize.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: nlos-sync-diagnostics
          path: /tmp/nlos-sync.log
          if-no-files-found: error
          retention-days: 7

      - name: Install LaTeX and PDF validation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y latexmk texlive-latex-extra texlive-fonts-recommended texlive-science texlive-pictures texlive-publishers texlive-bibtex-extra poppler-utils

      - name: Clean-build and validate survey
        run: |
          set -euo pipefail
          cp bare_jrnl.pdf /tmp/bare_jrnl_before.pdf
          rm -f bare_jrnl.pdf bare_jrnl.aux bare_jrnl.bbl bare_jrnl.blg bare_jrnl.log bare_jrnl.out bare_jrnl.toc bare_jrnl.fdb_latexmk bare_jrnl.fls
          latexmk -pdf -interaction=nonstopmode -halt-on-error bare_jrnl.tex
          test -s bare_jrnl.pdf
          test -s bare_jrnl.bbl
          pdfinfo bare_jrnl.pdf | grep -E '^Pages:[[:space:]]+[1-9][0-9]*$'
          pdftotext -layout bare_jrnl.pdf /tmp/bare_jrnl.txt
          mkdir -p /tmp/nlos_pdf_before /tmp/nlos_pdf_after
          pdftoppm -png -r 72 /tmp/bare_jrnl_before.pdf /tmp/nlos_pdf_before/page >/dev/null 2>&1
          pdftoppm -png -r 72 bare_jrnl.pdf /tmp/nlos_pdf_after/page >/dev/null 2>&1
          test "$(find /tmp/nlos_pdf_before -name 'page-*.png' | wc -l)" -gt 0
          test "$(find /tmp/nlos_pdf_after -name 'page-*.png' | wc -l)" -gt 0
          if grep -Eiq "undefined citations|Citation .* undefined|There were undefined references" bare_jrnl.log; then exit 1; fi
          if grep -Eiq "Warning--I didn't find a database entry|Repeated entry" bare_jrnl.blg; then exit 1; fi
          python - <<'PY'
          from pathlib import Path
          import re

          files = {
              'readme': Path('README.md').read_text(encoding='utf-8'),
              'index': Path('index.html').read_text(encoding='utf-8'),
              'active': Path('article/2active.tex').read_text(encoding='utf-8'),
              'passive': Path('article/3passive.tex').read_text(encoding='utf-8'),
              'learning': Path('article/4datadriven.tex').read_text(encoding='utf-8'),
              'new': Path('article/5newscenes.tex').read_text(encoding='utf-8'),
              'bib': Path('egbib_merged_20260711.bib').read_text(encoding='utf-8'),
              'pdf': Path('/tmp/bare_jrnl.txt').read_text(encoding='utf-8', errors='ignore'),
          }
          records = [
              ('MDUNet: Multimodal Decoding UNet for Passive Occluder-Aided Non-line-of-sight 3D Imaging', 'rajiMDUNet2026'),
              ('Thermal Non-Line-of-Sight Imaging through Rough Surfaces', 'yeThermalNLOSFormer2026'),
              ('Non-line-of-sight imaging via physics-informed cascade learning', 'zhaoPICL2026'),
              ('All-day non-line-of-sight imaging based on Si-SPAD and phase-congruency-based structured ε-regularization', 'yinAllDayNLOS2026'),
              ('Passive non-line-of-sight imaging with diffuse-aware attention-enhanced encoding', 'wangDiffuseAwarePassive2026'),
              ('Learned light-cone transform for fast and accurate non-line-of-sight imaging', 'gaoLearnedLCT2026'),
              ('Transient video interpolation for dynamic non-line-of-sight imaging', 'sunTransVID2026'),
              ('Multi-surface sub-resolution non-line-of-sight imaging via transient waveform deposition', 'weiMultiSurfaceNLOS2025'),
              ('Stereo non-line-of-sight imaging', 'luesiaStereoNLOS2026'),
              ('Compact non-line-of-sight imager at long range', 'zengCompactLongRangeNLOS2026'),
              ('A model decomposition method for the real-time non-line-of-sight imaging', 'yangModelDecompositionNLOS2026'),
          ]
          source = '\n'.join(files[k] for k in ('active','passive','learning','new'))
          for title, key in records:
              if files['readme'].lower().count('[' + title.lower() + ']') != 1:
                  raise SystemExit(f'README entry missing or duplicated: {title}')
              if files['index'].lower().count('title:"' + title.lower() + '"') != 1:
                  raise SystemExit(f'Homepage entry missing or duplicated: {title}')
              if key not in source:
                  raise SystemExit(f'Survey citation missing: {key}')
              if files['bib'].lower().count('{' + key.lower() + ',') != 1:
                  raise SystemExit(f'Bibliography key missing or duplicated: {key}')
          if '<div class="stat"><b>117</b><span>tracked latest entries</span></div>' not in files['index']:
              raise SystemExit('Homepage tracked count should be 117')
          for phrase in (
              'stereo relay-wall acquisition',
              'compact kilometer-range nlos imaging',
              'model-decomposition reconstruction from sparse transients',
          ):
              if phrase not in re.sub(r'\s+', ' ', files['pdf']).lower():
                  raise SystemExit(f'Generated PDF is missing: {phrase}')
          print('NLOS public artifacts, survey sources, bibliography, and PDF are mutually consistent.')
          PY

      - name: Commit synchronized sources and regenerated PDF to the PR branch
        if: github.event_name == 'pull_request'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add README.md index.html article/2active.tex article/3passive.tex article/4datadriven.tex article/5newscenes.tex bare_jrnl.tex egbib_merged_20260711.bib bare_jrnl.pdf updates
          if git diff --cached --quiet; then
            echo 'All artifacts already synchronized.'
          else
            git commit -m 'Synchronize July NLOS literature and rebuild survey'
            git push origin HEAD:${{ github.head_ref }}
          fi
