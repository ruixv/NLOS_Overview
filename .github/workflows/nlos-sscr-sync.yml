name: Validate July 2026 NLOS survey updates
# Final validation retry after the canonical bibliography rebuild settled.

on:
  push:
    paths:
      - .github/workflows/nlos-sscr-sync.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: nlos-feature-visibility-validation
  cancel-in-progress: true

jobs:
  rebuild-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Synchronize source artifacts and bibliography
        run: |
          python -m pip install bibtexparser==1.4.3
          python scripts/sync_nlos_20260711_run16.py
          python scripts/sync_nlos_20260711_run17.py
          python scripts/sync_nlos_20260712_feature_visibility.py
          python scripts/sync_nlos_20260712_realtime_dynamic.py
          python scripts/fix_nlos_20260712_realtime_citation_key.py
          python scripts/merge_nlos_bibliography.py
          grep -q "Truly missing citation keys: 0" updates/2026-07-11-bibliography-deduplication.md
          test "$(grep -ic '^@.*{liuAnalysisFeatureVisibility2019,' egbib_merged_20260711.bib)" -eq 1
          test "$(grep -ic '^@.*{nam_real-time_2020,' egbib_merged_20260711.bib)" -eq 1
          test "$(grep -ic '^@.*{namRealTimeDynamicScenes2021,' egbib_merged_20260711.bib)" -eq 0

      - name: Install LaTeX and PDF tools
        run: |
          sudo apt-get update
          sudo apt-get install -y latexmk texlive-latex-extra texlive-fonts-recommended texlive-science texlive-pictures texlive-publishers texlive-bibtex-extra poppler-utils

      - name: Build and validate survey
        run: |
          set -euo pipefail
          rm -f bare_jrnl.pdf bare_jrnl.aux bare_jrnl.bbl bare_jrnl.blg bare_jrnl.log bare_jrnl.out bare_jrnl.toc
          latexmk -pdf -interaction=nonstopmode bare_jrnl.tex
          test -s bare_jrnl.pdf
          test -s bare_jrnl.bbl
          pdfinfo bare_jrnl.pdf > /tmp/pdfinfo.txt
          pdftotext -layout bare_jrnl.pdf /tmp/bare_jrnl.txt
          test -s /tmp/bare_jrnl.txt

          ! grep -Eiq "Citation .* undefined|There were undefined references|undefined citations" bare_jrnl.log
          ! grep -Eiq "Warning--I didn't find a database entry|Repeated entry" bare_jrnl.blg

          grep -Fq 'liuAnalysisFeatureVisibility2019' bare_jrnl.aux
          grep -Fq 'liuAnalysisFeatureVisibility2019' bare_jrnl.bbl
          grep -Fq 'Analysis of Feature Visibility in Non-Line-of-Sight Measurements' bare_jrnl.bbl
          grep -Fq 'nam_real-time_2020' bare_jrnl.aux
          grep -Fq 'nam_real-time_2020' bare_jrnl.bbl
          ! grep -Fq 'namRealTimeDynamicScenes2021' bare_jrnl.bbl
          grep -Fq 'Analysis of Feature Visibility in Non-Line-of-Sight Measurements' README.md
          grep -Fq 'Analysis of Feature Visibility in Non-Line-of-Sight Measurements' index.html
          grep -Fq 'Visibility limits and recoverability' article/2active.tex

          python - <<'PY'
          from pathlib import Path
          import re
          raw = Path('/tmp/bare_jrnl.txt').read_text(encoding='utf-8', errors='ignore').casefold()
          compact = re.sub(r'[^a-z0-9]+', '', raw)
          required = (
              'recoverability',
              'acquisitiongeometry',
              'fullpipelinerealtimenlosvideomilestone',
          )
          missing = [token for token in required if token not in compact]
          if missing:
              raise SystemExit(f'Missing compact PDF tokens: {missing}')
          PY

      - name: Record successful validation
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          p = Path('updates/2026-07-12-feature-visibility-citation-tracing-update.md')
          text = p.read_text(encoding='utf-8')
          text = re.sub(r'\n\*\*Build result:\*\*.*?(?=\n\n|\Z)', '', text, flags=re.S)
          status = (
              "\n\n**Build result:** successful clean LaTeX/BibTeX rebuild after the combined 12 July updates. "
              "README, homepage, survey source, canonical duplicate-free bibliography, and `bare_jrnl.pdf` "
              "are synchronized. `pdfinfo` and `pdftotext` passed; no undefined, repeated, or duplicate-paper "
              "citation records were detected. The full feature-visibility title was verified in the compiled "
              "bibliography, and stable text fragments from its literature-review paragraph were verified in "
              "the extracted PDF text.\n"
          )
          p.write_text(text.rstrip() + status, encoding='utf-8')
          Path('updates/2026-07-12-feature-visibility-build-diagnostic.md').unlink(missing_ok=True)
          PY

      - name: Commit validated artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md index.html article/2active.tex bare_jrnl.tex \
            egbib_20260712_realtime_updates.bib egbib_merged_20260711.bib bare_jrnl.pdf \
            updates/2026-07-12-feature-visibility-citation-tracing-update.md \
            updates/2026-07-12-realtime-dynamic-nlos-citation-tracing-update.md \
            updates/2026-07-11-bibliography-deduplication.md \
            scripts/sync_nlos_20260712_feature_visibility.py \
            scripts/sync_nlos_20260712_realtime_dynamic.py \
            scripts/fix_nlos_20260712_realtime_citation_key.py \
            .github/workflows/nlos-sscr-sync.yml
          git add -A updates/2026-07-12-feature-visibility-build-diagnostic.md 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Validate feature visibility in rebuilt NLOS survey"
            git pull --rebase origin master
            git push origin HEAD:master
          fi
