name: Sync non-planar-relay NLOS update

on:
  push:
    branches: [master, automation/nonplanar-relay-20260715]
    paths:
      - egbib_20260715_nonplanar_relay_updates.bib
      - scripts/sync_nlos_20260715_nonplanar_relay.py
      - .github/workflows/sync_nonplanar_relay_nlos_20260715.yml
  pull_request:
    branches: [master]
    paths:
      - egbib_20260715_nonplanar_relay_updates.bib
      - scripts/sync_nlos_20260715_nonplanar_relay.py
      - updates/2026-07-15-nonplanar-relay-citation-tracing.md
      - .github/workflows/sync_nonplanar_relay_nlos_20260715.yml

permissions:
  contents: write

jobs:
  sync-build-validate:
    runs-on: ubuntu-latest
    env:
      TARGET_BRANCH: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
    steps:
      - name: Check out writable branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.TARGET_BRANCH }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Synchronize public sources
        run: python scripts/sync_nlos_20260715_nonplanar_relay.py

      - name: Merge and audit bibliography
        run: |
          python -m pip install --disable-pip-version-check bibtexparser==1.4.3
          python scripts/merge_nlos_bibliography.py

      - name: Install LaTeX and PDF validation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y latexmk texlive-latex-extra texlive-fonts-recommended texlive-science texlive-pictures texlive-publishers texlive-bibtex-extra poppler-utils

      - name: Clean-build survey PDF
        run: |
          rm -f bare_jrnl.pdf bare_jrnl.aux bare_jrnl.bbl bare_jrnl.blg bare_jrnl.log bare_jrnl.out bare_jrnl.toc bare_jrnl.fdb_latexmk bare_jrnl.fls
          latexmk -pdf -interaction=nonstopmode -halt-on-error bare_jrnl.tex

      - name: Validate citations, bibliography, and PDF
        run: |
          test -s bare_jrnl.pdf
          test -s bare_jrnl.bbl
          pdfinfo bare_jrnl.pdf | grep -E '^Pages:[[:space:]]+[1-9][0-9]*$'
          pdftotext -layout bare_jrnl.pdf bare_jrnl.txt
          grep -Fi "non-planar relay surfaces" bare_jrnl.txt
          grep -Fi "non-planar relay surfaces" bare_jrnl.bbl
          if grep -Eiq "undefined citations|Citation .* undefined|There were undefined references" bare_jrnl.log; then
            echo "Undefined citations or references detected" >&2
            exit 1
          fi
          if grep -Eiq "Warning--I didn't find a database entry|Repeated entry" bare_jrnl.blg; then
            echo "Missing or repeated BibTeX entries detected" >&2
            exit 1
          fi
          python - <<'PY'
          from pathlib import Path
          bib = Path("egbib_merged_20260711.bib").read_text(encoding="utf-8")
          tex = Path("article/2active.tex").read_text(encoding="utf-8")
          key = "guFastNLOSNonPlanar2023"
          if "{" + key + "," not in bib:
              raise SystemExit(f"missing bibliography key: {key}")
          if "\\cite{" + key + "}" not in tex and ("," + key + "}") not in tex:
              raise SystemExit(f"missing survey citation: {key}")
          print("Non-planar-relay citation and bibliography entry are present.")
          PY
          rm bare_jrnl.txt

      - name: Commit synchronized sources and generated PDF
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md index.html article/2active.tex bare_jrnl.tex bare_jrnl.pdf egbib_merged_20260711.bib updates/2026-07-11-bibliography-deduplication.md updates/2026-07-15-nonplanar-relay-citation-tracing.md
          if git diff --cached --quiet; then
            echo "Repository already synchronized."
            exit 0
          fi
          git commit -m "Integrate ICCP non-planar relay NLOS milestone"
          git fetch origin "$TARGET_BRANCH"
          git rebase "origin/$TARGET_BRANCH"
          git push origin HEAD:"$TARGET_BRANCH"
